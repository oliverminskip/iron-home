<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Iron Home"/>
  <meta name="theme-color" content="#f5f4f0"/>
  <title>Iron Home</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:"Courier New",Courier,monospace;background:#f5f4f0;color:#1a1814;min-height:100vh;-webkit-tap-highlight-color:transparent}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    button{cursor:pointer;font-family:inherit}
    #loading{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
    .spinner{width:36px;height:36px;border:3px solid #e0d8c8;border-top-color:#c8960a;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-txt{font-size:12px;color:#9a9690;letter-spacing:3px;text-transform:uppercase}
    #login-screen{display:none;position:fixed;inset:0;background:#f5f4f0;align-items:center;justify-content:center;z-index:100;padding:24px}
    .login-box{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1.5px solid #e8e4dc}
    .login-logo{font-size:48px;margin-bottom:12px}
    .login-title{font-size:28px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:6px}
    .login-sub{font-size:13px;color:#9a9690;margin-bottom:32px;line-height:1.6}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;border:2px solid #ddd9d0;border-radius:12px;font-size:15px;font-weight:700;color:#1a1814;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .btn-google:hover{border-color:#c8960a;box-shadow:0 4px 12px rgba(0,0,0,.12)}
    .google-icon{width:20px;height:20px;flex-shrink:0}
    .login-footer{font-size:11px;color:#bbb;margin-top:20px;line-height:1.6}
    #app{display:none;min-height:100vh}
    .app-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr}
    @media(min-width:860px){
      .app-inner{grid-template-columns:260px 1fr;min-height:100vh}
      .sidebar{border-right:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;height:100vh;overflow-y:auto}
      .main-col{max-width:700px}
      .mobile-header,.mobile-tabs{display:none!important}
    }
    @media(max-width:859px){.sidebar{display:none}}
    .sidebar{padding:28px 20px}
    .sb-logo{font-size:9px;letter-spacing:4px;color:#9a9690;margin-bottom:4px;text-transform:uppercase}
    .sb-title{font-size:24px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:4px}
    .sb-sub{font-size:11px;color:#9a9690;margin-bottom:24px}
    .sb-nav{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
    .sb-nav-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9a9690;text-align:left;transition:all .12s}
    .sb-nav-btn:hover{background:#f5f4f0;color:#1a1814}
    .sb-nav-btn.active{background:#fef9e8;color:#c8960a}
    .sb-divider{border:none;border-top:1px solid #e8e4dc;margin:16px 0}
    .sb-user{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
    .sb-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc}
    .sb-avatar-init{width:32px;height:32px;border-radius:50%;background:#c8960a;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .sb-user-name{font-size:13px;font-weight:600;color:#1a1814;flex:1}
    .btn-signout{font-size:11px;color:#9a9690;background:none;border:1px solid #e8e4dc;border-radius:6px;padding:4px 10px;letter-spacing:1px;text-transform:uppercase}
    .btn-signout:hover{color:#c03030;border-color:#f0b0b0}
    .sb-sets{padding:12px 14px;margin-top:8px;background:#fef9e8;border-radius:8px;border:1px solid #e8c870}
    .sb-sets-num{font-size:22px;font-weight:700}
    .sb-sets-lbl{font-size:10px;color:#9a9690;letter-spacing:1px;text-transform:uppercase}
    .mobile-header{padding:14px 16px 10px;border-bottom:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;z-index:50}
    .mob-top{display:flex;justify-content:space-between;align-items:center}
    .mob-eyebrow{font-size:9px;letter-spacing:4px;color:#9a9690;text-transform:uppercase}
    .mob-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
    .mob-right{display:flex;align-items:center;gap:10px}
    .mob-sets-num{font-size:20px;font-weight:700}
    .mob-sets-lbl{font-size:9px;color:#9a9690;letter-spacing:1px;text-transform:uppercase}
    .mob-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc;cursor:pointer}
    .mob-avatar-init{width:30px;height:30px;border-radius:50%;background:#c8960a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .mobile-tabs{display:flex;background:#fff;border-bottom:1.5px solid #ddd9d0}
    .tab-btn{flex:1;padding:11px 4px;background:none;border:none;border-bottom:3px solid transparent;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:#9a9690;transition:color .15s}
    .tab-btn.active{border-bottom-color:var(--accent,#c8960a);color:var(--accent,#c8960a)}
    .main-col{padding-bottom:80px}
    @media(min-width:860px){.main-col{padding:28px 28px 60px}}
    .day-picker{display:flex;gap:8px;padding:14px 14px 0;background:#fff;border-bottom:1px solid #e8e4dc}
    @media(min-width:860px){.day-picker{padding:0 0 16px;background:transparent;border-bottom:none}}
    .day-btn{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid #ddd9d0;background:#f5f4f0;color:#5a5650;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all .12s;position:relative}
    .day-btn.active{color:#fff}
    .day-emoji{font-size:18px;margin-bottom:3px}
    .day-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#2a7a3a}
    .day-header{padding:12px 14px 8px;background:#fff;border-bottom:1px solid #e8e4dc}
    @media(min-width:860px){.day-header{background:transparent;border-bottom:none;padding:0 0 12px}}
    .day-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
    .day-subtitle{font-size:11px;color:#9a9690;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
    .prev-badge{display:inline-block;margin-top:6px;font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:6px;padding:5px 10px;font-weight:600}
    .finished-badge{font-size:11px;color:#2a7a3a;font-weight:600}
    .warmup-box{margin:12px 14px 8px;background:#fff8ec;border:1px solid #e8c870;border-left:4px solid #c8960a;border-radius:10px;padding:11px 14px}
    @media(min-width:860px){.warmup-box{margin:0 0 12px}}
    .warmup-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:7px;font-weight:700}
    .warmup-item{font-size:13px;color:#5a5650;margin-bottom:4px}
    .warmup-arrow{color:#c8960a;margin-right:6px}
    .rpt-note{margin:0 14px 10px;background:#fef9e8;border:1px solid #e0c040;border-radius:10px;padding:9px 14px}
    @media(min-width:860px){.rpt-note{margin:0 0 12px}}
    .rpt-note-title{font-size:11px;color:#8a6a00;font-weight:700;margin-bottom:2px}
    .rpt-note-body{font-size:12px;color:#5a5650;line-height:1.6}
    .ex-list{padding:0 14px}
    @media(min-width:860px){.ex-list{padding:0}}
    .ex-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid #ddd9d0;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .15s}
    .ex-card.open{box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .ex-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
    .ex-name{font-size:16px;font-weight:700;font-family:Georgia,serif;margin-bottom:5px}
    .ex-status-done{font-size:12px;color:#2a7a3a;font-weight:600;margin-left:8px}
    .ex-status-prog{font-size:12px;color:#a06000;font-weight:600;margin-left:8px}
    .ex-toggle{font-size:22px;color:#9a9690;line-height:1}
    .ex-body{padding:0 16px 16px}
    .tag{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;font-weight:600}
    .wu-table{background:#fff8ec;border:1px solid #e8c870;border-radius:8px;padding:10px 12px;margin-bottom:14px}
    .wu-table-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:8px;font-weight:700}
    .wu-row{display:grid;grid-template-columns:52px 60px 60px 1fr;gap:6px;padding:5px 0}
    .wu-row+.wu-row{border-top:1px solid #f0e0b0}
    .wu-label{font-size:12px;color:#a07020;font-weight:700}
    .wu-pct,.wu-reps{font-size:12px;color:#5a5650}
    .wu-rest{font-size:11px;color:#9a9690}
    .ws-col-headers{display:grid;grid-template-columns:52px 1fr 78px 78px;gap:6px;padding:4px 0 2px}
    .ws-col-h{font-size:9px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600}
    .set-row{border-bottom:1px solid #e8e4dc;padding:10px 0}
    .set-row.has-entry{background:#f0faf2;margin:0 -16px;padding:10px 16px}
    .set-row-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .set-label{font-size:13px;font-weight:700;min-width:52px}
    .set-target{font-size:13px;color:#5a5650}
    .set-target strong{color:#1a1814}
    .set-rest{font-size:11px;color:#9a9690;margin-left:auto}
    .set-inputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .set-input{width:78px;background:#f8f6f2;border:1.5px solid #d0ccc4;border-radius:7px;color:#1a1814;font-size:15px;padding:7px 10px;font-family:inherit;outline:none;font-weight:600}
    .set-input.filled{border-color:#2a7a3a}
    .prev-tag{font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:4px;padding:2px 8px;white-space:nowrap;font-weight:600}
    .hiit-title{font-size:11px;letter-spacing:1px;color:#904010;text-transform:uppercase;margin-bottom:6px;font-weight:600}
    .hiit-row{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #e8e4dc}
    .hiit-label{font-size:13px;font-weight:700;min-width:34px}
    .hiit-range{font-size:13px;color:#5a5650}
    .drop-set{margin-top:10px;font-size:12px;color:#b03030;background:#fff0f0;border:1px solid #f0b0b0;border-radius:7px;padding:9px 12px;font-weight:600}
    .cue{margin-top:12px;font-size:12px;color:#5a5650;line-height:1.8;font-style:italic;border-left:3px solid;padding-left:12px;padding-top:2px}
    .bottom-btns{padding:16px 14px 0;display:flex;flex-direction:column;gap:10px}
    @media(min-width:860px){.bottom-btns{padding:16px 0 0}}
    .btn-finish{width:100%;padding:16px;background:#2a7a3a;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;box-shadow:0 3px 10px rgba(42,122,58,.25)}
    .btn-finish:hover{background:#236632}
    .btn-finished-state{width:100%;padding:14px;background:#edf7ef;border:1.5px solid #2a7a3a;border-radius:12px;color:#2a7a3a;font-size:15px;font-weight:700;text-align:center}
    .btn-clear{width:100%;padding:12px;background:none;border:1.5px solid #f0b0b0;border-radius:10px;color:#c03030;font-size:13px;font-weight:600}
    .btn-clear-confirm{flex:1;padding:12px;background:#c03030;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700}
    .btn-cancel{flex:1;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
    .confirm-row{display:flex;gap:8px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
    .modal-box{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
    .modal-icon{font-size:32px;text-align:center;margin-bottom:8px}
    .modal-title{font-size:20px;font-weight:700;font-family:Georgia,serif;text-align:center;margin-bottom:6px}
    .modal-body{font-size:14px;color:#5a5650;text-align:center;margin-bottom:24px;line-height:1.6}
    .btn-modal-confirm{width:100%;padding:14px;background:#2a7a3a;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;margin-bottom:10px}
    .btn-modal-cancel{width:100%;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
    .history-wrap,.schedule-wrap{padding:14px}
    @media(min-width:860px){.history-wrap,.schedule-wrap{padding:0}}
    .section-title{font-size:11px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;margin-bottom:14px;font-weight:600}
    .history-empty{padding:40px 20px;text-align:center;color:#9a9690;font-size:15px;line-height:1.8}
    .hist-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .hist-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
    .hist-day-name{font-size:16px;font-weight:700;font-family:Georgia,serif;font-style:italic}
    .hist-date{font-size:12px;color:#9a9690;margin-top:2px}
    .hist-body{padding:0 16px 16px}
    .hist-ex-name{font-size:13px;font-weight:700;margin-bottom:4px;margin-top:10px}
    .hist-set-row{display:flex;gap:12px;font-size:13px;color:#5a5650;margin-bottom:3px;padding-left:12px}
    .hist-set-lbl{color:#9a9690;width:44px;flex-shrink:0}
    .hist-kg{color:#a07000;font-weight:700}
    .hist-reps{color:#1a1814;font-weight:700}
    .btn-delete{margin-top:12px;background:none;border:1px solid #f0b0b0;border-radius:6px;color:#c03030;font-size:12px;padding:9px 16px;font-weight:600}
    .btn-delete-yes{flex:1;padding:11px;background:#c03030;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700}
    .btn-delete-no{flex:1;padding:11px;background:none;border:1.5px solid #ddd9d0;border-radius:8px;color:#5a5650;font-size:13px}
    .sched-row{display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:8px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .sched-day{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;width:36px}
    .sched-session{font-size:14px;font-weight:600}
    .sched-rest{font-size:13px;color:#9a9690;font-style:italic}
    .sched-emoji{font-size:18px}
    .info-box{margin-top:10px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;padding:14px 16px}
    .info-box-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
    .info-box-body{font-size:13px;color:#5a5650;line-height:1.8}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1814;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;white-space:nowrap;z-index:9999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
    .user-menu{position:fixed;top:56px;right:12px;background:#fff;border:1.5px solid #ddd9d0;border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:200;min-width:200px;display:none}
    .user-menu.open{display:block}
    .user-menu-name{font-size:13px;font-weight:700;color:#1a1814;padding:8px 12px 4px}
    .user-menu-email{font-size:11px;color:#9a9690;padding:0 12px 8px;border-bottom:1px solid #e8e4dc}
    .user-menu-so{display:block;width:100%;padding:10px 12px;background:none;border:none;text-align:left;font-size:13px;color:#c03030;font-weight:600;margin-top:4px;border-radius:6px;cursor:pointer}
    .user-menu-so:hover{background:#fff0f0}
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="loading-txt">Loading...</div></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">&#x1F3CB;&#xFE0F;</div>
    <div class="login-title">Iron Home</div>
    <div class="login-sub">Your personal workout tracker.<br/>Sign in to access your sessions.</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>
    <div class="login-footer">Your data is private to your account only.<br/>Share the link with mates &mdash; they each get their own separate log.</div>
  </div>
</div>

<div id="user-menu" class="user-menu">
  <div class="user-menu-name" id="menu-name"></div>
  <div class="user-menu-email" id="menu-email"></div>
  <button class="user-menu-so" onclick="doSignOut()">Sign out</button>
</div>

<div id="toast"></div>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyDoaRigyOg4BcoK4jatcoFOqj3My7eaqI4",
  authDomain:"iron-home-1991.firebaseapp.com",
  projectId:"iron-home-1991",
  storageBucket:"iron-home-1991.firebasestorage.app",
  messagingSenderId:"628944758589",
  appId:"1:628944758589:web:811ab5c28eb193bdb00754"
});
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

async function fbSave(sk, data) {
  if (!currentUser) return;
  try { await setDoc(doc(db,"users",currentUser.uid,"sessions",sk),{data:JSON.stringify(data),updatedAt:Date.now()}); }
  catch(e){ console.error("Save:",e); }
}
async function fbDel(sk) {
  if (!currentUser) return;
  try { await deleteDoc(doc(db,"users",currentUser.uid,"sessions",sk)); }
  catch(e){ console.error("Del:",e); }
}
async function fbLoad() {
  if (!currentUser) return {};
  try {
    const snap = await getDocs(collection(db,"users",currentUser.uid,"sessions"));
    const log = {};
    snap.forEach(d=>{ try{ log[d.id]=JSON.parse(d.data().data); }catch{} });
    return log;
  } catch(e){ console.error("Load:",e); return {}; }
}

window.signInGoogle = async () => {

function tagEl(type){const s=TS[type]||TS.Straight;return `<span class="tag" style="background:${s.bg};border-color:${s.border};color:${s.text}">${type}</span>`;}
function prevBadge(kg,reps){if(!kg&&!reps)return"";const p=[];if(kg)p.push(kg+"kg");if(reps)p.push(reps+" reps");return`<span class="prev-tag">${p.join(" &middot; ")} &uarr;prev</span>`;}
function wuTbl(sets){if(!sets.length)return"";return`<div class="wu-table"><div class="wu-table-title">Warm-Up Sets &mdash; not logged</div>${sets.map(s=>`<div class="wu-row"><span class="wu-label">${s.label}</span><span class="wu-pct">${s.pct}</span><span class="wu-reps">${s.reps} reps</span><span class="wu-rest">${s.rest}</span></div>`).join("")}</div>`;}
function sRow(ws,i,isH,pd,td){
  if(isH)return`<div class="hiit-row"><span class="hiit-label">${ws.label}</span><span class="hiit-range">${ws.repRange}</span></div>`;
  const ck=td?.[i]?.kg||"",cr=td?.[i]?.reps||"",has=ck||cr;
  return`<div class="set-row${has?" has-entry":""}"><div class="set-row-top"><span class="set-label">${ws.label}</span><span class="set-target">Target: <strong>${ws.repRange}</strong></span>${ws.rest?`<span class="set-rest">rest: ${ws.rest}</span>`:""}</div><div class="set-inputs"><input class="set-input${ck?" filled":""}" type="number" inputmode="decimal" placeholder="kg" value="${ck}" oninput="updSet('${ws._eid}',${i},'kg',this.value)"/><input class="set-input${cr?" filled":""}" type="number" inputmode="numeric" placeholder="reps" value="${cr}" oninput="updSet('${ws._eid}',${i},'reps',this.value)"/>${prevBadge(pd?.[i]?.kg,pd?.[i]?.reps)}</div></div>`;
}
function exCard(ex,ts,ps){
  const t=TS[ex.type]||TS.Straight,isO=S.openEx[ex.id],isH=ex.type==="HIIT",td=ts?.[ex.id],pd=ps?.[ex.id];
  const logged=ex.workingSets.filter((_,i)=>td?.[i]?.kg||td?.[i]?.reps).length;
  const allD=logged===ex.workingSets.length&&logged>0;
  const stat=allD?`<span class="ex-status-done">&#x2713; done</span>`:logged>0?`<span class="ex-status-prog">${logged}/${ex.workingSets.length} sets</span>`:"";
  let body="";
  if(isO){
    const ch=isH?`<div class="hiit-title">4 Rounds &mdash; 40s on / 20s off</div>`:`<div class="ws-col-headers"><div class="ws-col-h"></div><div class="ws-col-h">TARGET</div><div class="ws-col-h">KG</div><div class="ws-col-h">REPS</div></div>`;
    body=`<div class="ex-body">${wuTbl(ex.warmupSets)}${ch}${ex.workingSets.map((ws,i)=>sRow({...ws,_eid:ex.id},i,isH,pd,td)).join("")}${ex.dropSet?`<div class="drop-set">DROP SET: ${ex.dropSet}</div>`:""}<div class="cue" style="border-color:${t.border}">${ex.cue}</div></div>`;
  }
  return`<div class="ex-card${isO?" open":""}" style="border-left-color:${isO?t.border:"#ddd9d0"}"><div class="ex-header" onclick="togEx('${ex.id}')"><div style="flex:1;padding-right:10px"><div class="ex-name">${ex.name}${stat}</div>${tagEl(ex.type)}</div><div class="ex-toggle">${isO?"&minus;":"+"}</div></div>${body}</div>`;
}

function rWorkout(){
  const d=DAYS.find(x=>x.id===S.activeDayId),sk=`${S.activeDayId}_${today()}`;
  const ts=S.log[sk]||{},fin=!!ts.finished;
  const pk=Object.keys(S.log).filter(k=>k.startsWith(S.activeDayId+"_")&&k!==sk&&S.log[k]?.finished).sort().reverse()[0]||null;
  const ps=pk?S.log[pk]:{};
  const n=d.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;
  const dayBtns=DAYS.map(x=>{const a=x.id===S.activeDayId,h=Object.keys(S.log).some(k=>k.startsWith(x.id+"_")&&S.log[k]?.finished);return`<button class="day-btn${a?" active":""}" style="${a?`background:${x.accent};border-color:${x.accent}`:""}" onclick="setDay('${x.id}')"><div class="day-emoji">${x.emoji}</div><div>${x.id}</div>${h&&!a?`<div class="day-dot"></div>`:""}</button>`;}).join("");
  let bb="";
  if(!fin&&n>0)bb+=`<button class="btn-finish" onclick="openFin()">&#x1F3C1; Finish Workout &mdash; Save to History</button>`;
  if(fin)bb+=`<div class="btn-finished-state">&#x2713; Session saved to history</div>`;
  if(n>0)bb+=S.confirmClear?`<div class="confirm-row"><button class="btn-clear-confirm" onclick="clearT()">Yes, clear it</button><button class="btn-cancel" onclick="setCC(false)">Cancel</button></div>`:`<button class="btn-clear" onclick="setCC(true)">Clear today&rsquo;s log</button>`;
  return`<div class="day-picker">${dayBtns}</div><div class="day-header"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px"><div><div class="day-title" style="color:${d.accent}">${d.name}</div><div class="day-subtitle">${d.subtitle}</div></div><div style="text-align:right"><div style="font-size:11px;color:#9a9690">&#x23F1; ${d.totalTime}</div>${fin?`<div class="finished-badge">&#x2713; Finished</div>`:""}</div></div>${pk?`<div class="prev-badge">&#x1F4CB; Prev: ${pk.split("_")[1]}</div>`:""}</div><div class="warmup-box"><div class="warmup-title">General Warm-Up &mdash; 5&ndash;8 min</div>${d.warmup.map(w=>`<div class="warmup-item"><span class="warmup-arrow">&rarr;</span>${w}</div>`).join("")}</div><div class="rpt-note"><div class="rpt-note-title">RPT &mdash; Heaviest set first</div><div class="rpt-note-body">Hit top of rep range on ALL sets &rarr; add weight next session. Log KG + reps for every working set.</div></div><div class="ex-list">${d.exercises.map(ex=>exCard(ex,ts,ps)).join("")}</div><div class="bottom-btns">${bb}</div>`;
}

function rHistory(){
  const entries=Object.entries(S.log).filter(([,d])=>d.finished).map(([key,dd])=>{const[di,dt]=key.split("_");const day=DAYS.find(d=>d.id===di);return day?{key,dt,day,dd}:null;}).filter(Boolean).sort((a,b)=>b.dt.localeCompare(a.dt));
  if(!entries.length)return`<div class="history-wrap"><div class="section-title">Session History</div><div class="history-empty">No finished sessions yet.<br/>Hit Finish Workout at the end of a session!</div></div>`;
  const cards=entries.map(({key,day,dt,dd})=>{
    const isO=S.openEx["h_"+key];
    let body="";
    if(isO){
      const rows=day.exercises.map(ex=>{const ed=dd[ex.id];if(!ed)return"";const hd=Object.values(ed).some(s=>s&&(s.kg||s.reps));if(!hd)return"";return`<div class="hist-ex-name">${ex.name}</div>`+ex.workingSets.map((ws,i)=>{const s=ed[i];if(!s||(!s.kg&&!s.reps))return"";return`<div class="hist-set-row"><span class="hist-set-lbl">${ws.label}</span>${s.kg?`<span class="hist-kg">${s.kg}kg</span>`:""}${s.reps?`<span class="hist-reps">${s.reps} reps</span>`:""}</div>`;}).join("");}).join("");
      const del=S.confirmDeleteKey===key?`<div class="confirm-row" style="margin-top:12px"><button class="btn-delete-yes" onclick="delSess('${key}')">Yes, delete</button><button class="btn-delete-no" onclick="setDC(null)">Cancel</button></div>`:`<button class="btn-delete" onclick="setDC('${key}')">Delete session</button>`;
      body=`<div class="hist-body">${rows}${del}</div>`;
    }
    return`<div class="hist-card" style="border-left-color:${day.accent}"><div class="hist-header" onclick="togEx('h_${key}')"><div><div class="hist-day-name">${day.emoji} Day ${day.id} &mdash; ${day.name}</div><div class="hist-date">${dt}</div></div><div style="font-size:20px;color:#9a9690">${isO?"&minus;":"+"}</div></div>${body}</div>`;
  }).join("");
  return`<div class="history-wrap"><div class="section-title">Session History</div>${cards}</div>`;
}

function rSchedule(){
  const rows=SCHEDULE.map(s=>{const day=s.dayId?DAYS.find(d=>d.id===s.dayId):null;return`<div class="sched-row" style="border-left-color:${s.color}"><div class="sched-day" style="color:${s.dayId?s.color:"#9a9690"}">${s.day}</div>${day?`<span class="sched-emoji">${day.emoji}</span><span class="sched-session">Day ${day.id} &mdash; ${day.name}</span>`:`<span class="sched-rest">Rest / Walk</span>`}</div>`;}).join("");
  return`<div class="schedule-wrap"><div class="section-title">Weekly Structure</div>${rows}<div class="info-box" style="border-left-color:#c8960a"><div class="info-box-title" style="color:#a07020">Progression Rule</div><div class="info-box-body">Hit the top of your rep range on <strong>all sets</strong> &rarr; add weight to Set 1 next session. Everything else auto-adjusts at &ndash;10&ndash;15%.</div></div><div class="info-box" style="border-left-color:#9a60d0"><div class="info-box-title" style="color:#6a30a8">Abs</div><div class="info-box-body">Day A: Hanging Knee Raises + Ab Wheel/Plank. Day C: Weighted Crunch + Bench Leg Raises. Core twice a week.</div></div></div>`;
}

function rModal(){
  if(!S.showFinishModal)return"";
  const day=DAYS.find(d=>d.id===S.activeDayId),ts=S.log[`${S.activeDayId}_${today()}`]||{};
  const n=day.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;
  return`<div class="modal-overlay" onclick="closeFin()"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-icon">&#x1F3C1;</div><div class="modal-title">Finish Day ${day.id} &mdash; ${day.name}?</div><div class="modal-body">${n} set${n!==1?"s":""} logged. Save to history?</div><button class="btn-modal-confirm" onclick="finSess()">Save to History &#x2713;</button><button class="btn-modal-cancel" onclick="closeFin()">Keep logging</button></div></div>`;
}

function render(){
  if(!currentUser)return;
  const day=DAYS.find(d=>d.id===S.activeDayId),accent=day.accent;
  const sk=`${S.activeDayId}_${today()}`,ts=S.log[sk]||{};
  const n=day.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;
  const name=currentUser.displayName||"User";
  const init=name.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
  const photo=currentUser.photoURL;
  const mobAv=photo?`<img src="${photo}" class="mob-avatar" onclick="toggleMenu()" onerror="this.outerHTML='<div class=mob-avatar-init onclick=toggleMenu()>${init}</div>'">`:`<div class="mob-avatar-init" onclick="toggleMenu()">${init}</div>`;
  const sbAv=photo?`<img src="${photo}" class="sb-avatar" onerror="this.outerHTML='<div class=sb-avatar-init>${init}</div>'">`:`<div class="sb-avatar-init">${init}</div>`;
  const tabs=["workout","history","schedule"].map(t=>`<button class="tab-btn${S.tab===t?" active":""}" style="--accent:${accent}" onclick="setTab('${t}')">${t==="workout"?"&#x1F4AA; Workout":t==="history"?"&#x1F4CB; History":"&#x1F4C5; Schedule"}</button>`).join("");
  const sbNav=["workout","history","schedule"].map(t=>`<button class="sb-nav-btn${S.tab===t?" active":""}" onclick="setTab('${t}')">${t==="workout"?"&#x1F4AA;":t==="history"?"&#x1F4CB;":"&#x1F4C5;"} ${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join("");
  let content=S.tab==="workout"?rWorkout():S.tab==="history"?rHistory():rSchedule();
  document.getElementById("app").innerHTML=`<div class="app-inner"><div class="sidebar"><div class="sb-logo">Home Training</div><div class="sb-title">IRON HOME</div><div class="sb-sub">Bowflex 1090s &middot; Pull-Up Bar &middot; Bench</div><div class="sb-nav">${sbNav}</div><hr class="sb-divider"/><div class="sb-user" onclick="toggleMenu()">${sbAv}<div class="sb-user-name">${name}</div><button class="btn-signout" onclick="event.stopPropagation();doSignOut()">Sign out</button></div>${n>0?`<div class="sb-sets"><div class="sb-sets-num" style="color:${accent}">${n}</div><div class="sb-sets-lbl">sets today</div></div>`:""}</div><div class="main-col"><div class="mobile-header"><div class="mob-top"><div><div class="mob-eyebrow">Home Training</div><div class="mob-title">IRON HOME</div></div><div class="mob-right">${n>0?`<div style="text-align:right"><div class="mob-sets-num" style="color:${accent}">${n}</div><div class="mob-sets-lbl">sets</div></div>`:""} ${mobAv}</div></div></div><div class="mobile-tabs">${tabs}</div>${content}</div></div>${rModal()}`;
}
window.render=render;

window.setTab=t=>{S.tab=t;render();};
window.setDay=id=>{S.activeDayId=id;S.confirmClear=false;render();};
window.togEx=id=>{S.openEx[id]=!S.openEx[id];render();};
window.setCC=v=>{S.confirmClear=v;render();};
window.setDC=k=>{S.confirmDeleteKey=k;render();};
window.openFin=()=>{S.showFinishModal=true;render();};
window.closeFin=()=>{S.showFinishModal=false;render();};

window.updSet=async(eid,i,field,val)=>{
  const sk=`${S.activeDayId}_${today()}`;
  if(!S.log[sk])S.log[sk]={};
  if(!S.log[sk][eid])S.log[sk][eid]={};
  if(!S.log[sk][eid][i])S.log[sk][eid][i]={};
  S.log[sk][eid][i][field]=val;
  await fbSave(sk,S.log[sk]);
};
window.finSess=async()=>{
  const sk=`${S.activeDayId}_${today()}`;
  if(!S.log[sk])S.log[sk]={};
  S.log[sk].finished=true;S.log[sk].finishedAt=new Date().toISOString();
  S.showFinishModal=false;
  await fbSave(sk,S.log[sk]);
  showToast("&#x2713; Session saved!");render();
};
window.clearT=async()=>{
  const sk=`${S.activeDayId}_${today()}`;
  await fbDel(sk);delete S.log[sk];S.confirmClear=false;showToast("Log cleared");render();
};
window.delSess=async k=>{
  await fbDel(k);delete S.log[k];S.confirmDeleteKey=null;S.openEx["h_"+k]=false;showToast("Session deleted");render();
};
</script>
</body>
</html>
