<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Iron Home"/>
<meta name="theme-color" content="#f5f4f0"/>
<title>Iron Home</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"Courier New",Courier,monospace;background:#f5f4f0;color:#1a1814;min-height:100vh;-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer;font-family:inherit}
/* LOADING */
#loading{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e0d8c8;border-top-color:#c8960a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:#9a9690;letter-spacing:3px;text-transform:uppercase}
/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:#f5f4f0;align-items:center;justify-content:center;z-index:100;padding:24px}
.login-box{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1.5px solid #e8e4dc}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:28px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:6px}
.login-sub{font-size:13px;color:#9a9690;margin-bottom:32px;line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;border:2px solid #ddd9d0;border-radius:12px;font-size:15px;font-weight:700;color:#1a1814;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.btn-google:hover{border-color:#c8960a}
.google-icon{width:20px;height:20px;flex-shrink:0}
.login-footer{font-size:11px;color:#bbb;margin-top:20px;line-height:1.6}
/* APP SHELL */
#app{display:none;min-height:100vh}
.app-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr}
@media(min-width:860px){
  .app-inner{grid-template-columns:260px 1fr;min-height:100vh}
  .sidebar{border-right:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main-col{max-width:720px}
  .mobile-header,.mobile-tabs{display:none!important}
}
@media(max-width:859px){.sidebar{display:none}}
/* SIDEBAR */
.sidebar{padding:28px 20px}
.sb-logo{font-size:9px;letter-spacing:4px;color:#9a9690;margin-bottom:4px;text-transform:uppercase}
.sb-title{font-size:24px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:4px}
.sb-sub{font-size:11px;color:#9a9690;margin-bottom:24px}
.sb-nav{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.sb-nav-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9a9690;text-align:left;transition:all .12s}
.sb-nav-btn:hover{background:#f5f4f0;color:#1a1814}
.sb-nav-btn.active{background:#fef9e8;color:#c8960a}
.sb-divider{border:none;border-top:1px solid #e8e4dc;margin:16px 0}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.sb-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc}
.sb-avatar-init{width:32px;height:32px;border-radius:50%;background:#c8960a;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sb-user-name{font-size:13px;font-weight:600;color:#1a1814;flex:1}
.btn-signout{font-size:11px;color:#9a9690;background:none;border:1px solid #e8e4dc;border-radius:6px;padding:4px 10px;text-transform:uppercase;letter-spacing:1px}
.sb-stat-pill{padding:12px 14px;margin-top:8px;background:#fef9e8;border-radius:8px;border:1px solid #e8c870}
.sb-stat-num{font-size:22px;font-weight:700}
.sb-stat-lbl{font-size:10px;color:#9a9690;letter-spacing:1px;text-transform:uppercase}
/* MOBILE HEADER */
.mobile-header{padding:14px 16px 10px;border-bottom:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;z-index:50}
.mob-top{display:flex;justify-content:space-between;align-items:center}
.mob-eyebrow{font-size:9px;letter-spacing:4px;color:#9a9690;text-transform:uppercase}
.mob-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.mob-right{display:flex;align-items:center;gap:10px}
.mob-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc;cursor:pointer}
.mob-avatar-init{width:30px;height:30px;border-radius:50%;background:#c8960a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* MOBILE TABS */
.mobile-tabs{display:flex;background:#fff;border-bottom:1.5px solid #ddd9d0;overflow-x:auto}
.tab-btn{flex:0 0 auto;padding:11px 14px;background:none;border:none;border-bottom:3px solid transparent;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:#9a9690;white-space:nowrap}
.tab-btn.active{border-bottom-color:var(--accent,#c8960a);color:var(--accent,#c8960a)}
/* MAIN COLUMN */
.main-col{padding-bottom:80px}
@media(min-width:860px){.main-col{padding:28px 28px 60px}}
/* WORKOUT SELECTOR */
.workout-selector{padding:14px 14px 0;background:#fff;border-bottom:1px solid #e8e4dc}
@media(min-width:860px){.workout-selector{padding:0 0 16px;background:transparent;border-bottom:none}}
.workout-tabs{display:flex;gap:8px}
.wk-btn{flex:1;padding:12px 6px;border-radius:10px;border:1.5px solid #ddd9d0;background:#f5f4f0;color:#5a5650;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all .12s;position:relative}
.wk-btn.active{color:#fff}
.wk-btn .wk-emoji{font-size:20px;margin-bottom:3px}
.wk-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#2a7a3a}
/* SESSION HEADER */
.session-header{padding:12px 14px 10px;background:#fff;border-bottom:1px solid #e8e4dc}
@media(min-width:860px){.session-header{background:transparent;border-bottom:none;padding:0 0 14px}}
.session-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.session-sub{font-size:11px;color:#9a9690;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.session-meta{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;align-items:center}
.session-timer-badge{font-size:12px;color:#2a7a3a;background:#edf7ef;border:1px solid #a0d0a8;border-radius:6px;padding:4px 10px;font-weight:700;letter-spacing:1px}
.prev-badge{display:inline-block;font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:6px;padding:4px 10px;font-weight:600}
.finished-badge{font-size:11px;color:#2a7a3a;font-weight:600}
/* START WORKOUT SCREEN */
.start-screen{padding:24px 14px}
@media(min-width:860px){.start-screen{padding:0}}
.start-card{background:#fff;border:1.5px solid #ddd9d0;border-radius:16px;padding:28px 24px;text-align:center;max-width:400px;margin:0 auto}
.start-card-emoji{font-size:48px;margin-bottom:12px}
.start-card-title{font-size:20px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:6px}
.start-card-sub{font-size:13px;color:#9a9690;margin-bottom:8px;line-height:1.6}
.start-card-prev{font-size:12px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:6px;padding:6px 12px;margin-bottom:20px;display:inline-block}
.btn-start-workout{width:100%;padding:16px;background:#2a7a3a;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;box-shadow:0 3px 10px rgba(42,122,58,.25)}
.btn-start-workout:hover{background:#236632}
/* WARMUP */
.warmup-box{margin:12px 14px 8px;background:#fff8ec;border:1px solid #e8c870;border-left:4px solid #c8960a;border-radius:10px;padding:11px 14px}
@media(min-width:860px){.warmup-box{margin:0 0 12px}}
.warmup-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:7px;font-weight:700}
.warmup-item{font-size:13px;color:#5a5650;margin-bottom:4px}
.warmup-arrow{color:#c8960a;margin-right:6px}
/* RPT NOTE */
.rpt-note{margin:0 14px 10px;background:#fef9e8;border:1px solid #e0c040;border-radius:10px;padding:9px 14px}
@media(min-width:860px){.rpt-note{margin:0 0 12px}}
.rpt-note-title{font-size:11px;color:#8a6a00;font-weight:700;margin-bottom:2px}
.rpt-note-body{font-size:12px;color:#5a5650;line-height:1.6}
/* EXERCISE CARDS */
.ex-list{padding:0 14px}
@media(min-width:860px){.ex-list{padding:0}}
.ex-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid #ddd9d0;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ex-card.open{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ex-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.ex-name{font-size:16px;font-weight:700;font-family:Georgia,serif;margin-bottom:5px}
.ex-status-done{font-size:12px;color:#2a7a3a;font-weight:600;margin-left:8px}
.ex-status-prog{font-size:12px;color:#a06000;font-weight:600;margin-left:8px}
.ex-toggle{font-size:22px;color:#9a9690;line-height:1}
.ex-body{padding:0 16px 16px}
.tag{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;font-weight:600}
/* WARMUP TABLE */
.wu-table{background:#fff8ec;border:1px solid #e8c870;border-radius:8px;padding:10px 12px;margin-bottom:14px}
.wu-table-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.wu-row{display:grid;grid-template-columns:52px 60px 60px 1fr;gap:6px;padding:5px 0}
.wu-row+.wu-row{border-top:1px solid #f0e0b0}
.wu-label{font-size:12px;color:#a07020;font-weight:700}
.wu-pct,.wu-reps{font-size:12px;color:#5a5650}
.wu-rest{font-size:11px;color:#9a9690}
/* SET ROWS */
.ws-col-headers{display:grid;grid-template-columns:56px 1fr 72px 72px 90px;gap:6px;padding:4px 0 2px}
.ws-col-h{font-size:9px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600}
.set-row{border-bottom:1px solid #e8e4dc;padding:10px 0}
.set-row.has-entry{background:#f0faf2;margin:0 -16px;padding:10px 16px}
.set-row-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.set-label{font-size:13px;font-weight:700;min-width:56px}
.set-target{font-size:13px;color:#5a5650}
.set-target strong{color:#1a1814}
.set-rest-lbl{font-size:11px;color:#9a9690;margin-left:auto}
.set-inputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.set-input{width:72px;background:#f8f6f2;border:1.5px solid #d0ccc4;border-radius:7px;color:#1a1814;font-size:15px;padding:7px 10px;font-family:inherit;outline:none;font-weight:600}
.set-input.filled{border-color:#2a7a3a}
.prev-tag{font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:4px;padding:2px 8px;white-space:nowrap;font-weight:600}
/* REST TIMER BUTTON */
.btn-rest{padding:5px 12px;background:#f5f4f0;border:1.5px solid #ddd9d0;border-radius:7px;font-size:11px;font-weight:700;color:#5a5650;letter-spacing:.5px;white-space:nowrap;transition:all .15s}
.btn-rest.running{background:#edf7ef;border-color:#2a7a3a;color:#2a7a3a}
.btn-rest.done{background:#fff8ec;border-color:#c8960a;color:#c8960a;animation:pulse .6s ease 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
/* DROP SET / CUE */
.drop-set{margin-top:10px;font-size:12px;color:#b03030;background:#fff0f0;border:1px solid #f0b0b0;border-radius:7px;padding:9px 12px;font-weight:600}
.drop-set-row{border-top:2px dashed #f0b0b0;margin-top:8px;padding-top:10px}
.drop-set-row.has-entry{background:#fff5f5;margin:8px -16px 0;padding:10px 16px;border-top:2px dashed #f0b0b0}
.cue{margin-top:12px;font-size:12px;color:#5a5650;line-height:1.8;font-style:italic;border-left:3px solid;padding-left:12px;padding-top:2px}
/* BOTTOM BUTTONS */
.bottom-btns{padding:16px 14px 0;display:flex;flex-direction:column;gap:10px}
@media(min-width:860px){.bottom-btns{padding:16px 0 0}}
.btn-finish{width:100%;padding:16px;background:#2a7a3a;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;box-shadow:0 3px 10px rgba(42,122,58,.25)}
.btn-finish:hover{background:#236632}
.btn-finished-state{width:100%;padding:14px;background:#edf7ef;border:1.5px solid #2a7a3a;border-radius:12px;color:#2a7a3a;font-size:15px;font-weight:700;text-align:center}
.btn-clear{width:100%;padding:12px;background:none;border:1.5px solid #f0b0b0;border-radius:10px;color:#c03030;font-size:13px;font-weight:600}
.btn-confirm{flex:1;padding:12px;background:#c03030;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700}
.btn-cancel{flex:1;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
.confirm-row{display:flex;gap:8px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.modal-box{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-icon{font-size:32px;text-align:center;margin-bottom:8px}
.modal-title{font-size:20px;font-weight:700;font-family:Georgia,serif;text-align:center;margin-bottom:6px}
.modal-body{font-size:14px;color:#5a5650;text-align:center;margin-bottom:24px;line-height:1.6}
.btn-modal-ok{width:100%;padding:14px;background:#2a7a3a;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;margin-bottom:10px}
.btn-modal-cancel{width:100%;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
/* HISTORY */
.history-wrap{padding:14px}
@media(min-width:860px){.history-wrap{padding:0}}
.section-title{font-size:11px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.history-empty{padding:40px 20px;text-align:center;color:#9a9690;font-size:15px;line-height:1.8}
.hist-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.hist-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.hist-day-name{font-size:16px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.hist-meta{font-size:11px;color:#9a9690;margin-top:2px}
.hist-body{padding:0 16px 16px}
.hist-ex-name{font-size:13px;font-weight:700;margin-bottom:4px;margin-top:10px}
.hist-set-row{display:flex;gap:12px;font-size:13px;color:#5a5650;margin-bottom:3px;padding-left:12px}
.hist-set-lbl{color:#9a9690;width:44px;flex-shrink:0}
.hist-kg{color:#a07000;font-weight:700}
.hist-reps{color:#1a1814;font-weight:700}
.hist-vol{font-size:11px;color:#9a9690;margin-top:6px;font-style:italic}
.btn-delete{margin-top:12px;background:none;border:1px solid #f0b0b0;border-radius:6px;color:#c03030;font-size:12px;padding:9px 16px;font-weight:600}
.btn-delete-yes{flex:1;padding:11px;background:#c03030;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700}
.btn-delete-no{flex:1;padding:11px;background:none;border:1.5px solid #ddd9d0;border-radius:8px;color:#5a5650;font-size:13px}
/* SCHEDULE */
.schedule-wrap{padding:14px}
@media(min-width:860px){.schedule-wrap{padding:0}}
.sched-row{display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:8px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.info-box{margin-top:10px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;padding:14px 16px}
.info-box-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.info-box-body{font-size:13px;color:#5a5650;line-height:1.8}
/* ═══ STATS TAB ═══ */
.stats-wrap{padding:14px}
@media(min-width:860px){.stats-wrap{padding:0}}
/* Unit toggle */
.unit-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.unit-group{display:flex;gap:0;border:1.5px solid #ddd9d0;border-radius:8px;overflow:hidden}
.unit-btn{padding:7px 14px;border:none;background:#f5f4f0;font-size:12px;font-weight:700;color:#5a5650;letter-spacing:.5px;border-right:1px solid #ddd9d0}
.unit-btn:last-child{border-right:none}
.unit-btn.active{background:#c8960a;color:#fff}
.unit-sep{font-size:11px;color:#9a9690;padding:0 4px;align-self:center}
/* Stats card */
.stats-card{background:#fff;border:1.5px solid #ddd9d0;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stats-card-title{font-size:10px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.stats-input-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
.stats-field{display:flex;flex-direction:column;gap:4px}
.stats-label{font-size:11px;color:#9a9690;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.stats-input{width:110px;background:#f8f6f2;border:1.5px solid #d0ccc4;border-radius:7px;color:#1a1814;font-size:15px;padding:8px 10px;font-family:inherit;outline:none;font-weight:600}
.stats-input:focus{border-color:#c8960a}
.btn-log-stats{padding:10px 20px;background:#c8960a;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;align-self:flex-end}
/* Result tiles */
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.result-tile{background:#f8f6f2;border:1.5px solid #e8e4dc;border-radius:10px;padding:12px 14px}
.result-tile.hi{background:#fef9e8;border-color:#e8c870}
.result-tile.go{background:#edf7ef;border-color:#a0d0a8}
.result-tile.wa{background:#fff3ea;border-color:#f0c090}
.result-tile.ba{background:#fff0f0;border-color:#f0b0b0}
.result-lbl{font-size:10px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.result-val{font-size:22px;font-weight:700;color:#1a1814;font-family:Georgia,serif}
.result-sub{font-size:11px;color:#9a9690;margin-top:2px}
/* Kinobody ratio bar */
.kino-bar-wrap{margin-top:4px}
.kino-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#9a9690;margin-bottom:6px}
.kino-bar-track{height:12px;background:#e8e4dc;border-radius:6px;overflow:visible;position:relative}
.kino-bar-fill{height:100%;border-radius:6px;transition:width .5s}
.kino-marker{position:absolute;top:-4px;width:3px;height:20px;background:#2a7a3a;border-radius:2px}
.kino-status{margin-top:8px;font-size:13px;font-weight:600;line-height:1.6}
/* Phase toggle */
.phase-toggle{display:flex;gap:0;border:1.5px solid #ddd9d0;border-radius:10px;overflow:hidden;margin-bottom:14px}
.phase-btn{flex:1;padding:10px 6px;border:none;background:#f5f4f0;font-size:12px;font-weight:700;color:#5a5650;border-right:1px solid #ddd9d0;transition:all .12s}
.phase-btn:last-child{border-right:none}
.phase-btn.cut.active{background:#1a7fa8;color:#fff}
.phase-btn.recomp.active{background:#c8960a;color:#fff}
.phase-btn.bulk.active{background:#2a7a3a;color:#fff}
/* Macro panel */
.macro-panel{background:#fff;border:1.5px solid #ddd9d0;border-radius:12px;padding:16px;margin-bottom:14px}
.macro-phase-lbl{font-size:11px;font-weight:600;margin-bottom:12px;padding:6px 12px;border-radius:6px;text-align:center}
.macro-phase-lbl.cut{background:#eaf2fb;color:#1a5fa8}
.macro-phase-lbl.recomp{background:#fef9e8;color:#8a6a00}
.macro-phase-lbl.bulk{background:#edf7ef;color:#1a5a28}

.macro-tile{background:#f8f6f2;border:1.5px solid #e8e4dc;border-radius:10px;padding:12px}
.macro-lbl{font-size:10px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.macro-val{font-size:20px;font-weight:700;color:#1a1814;font-family:Georgia,serif}
.macro-sub{font-size:11px;color:#9a9690;margin-top:1px}
/* SVG Charts */
.chart-wrap{margin-top:4px;overflow-x:auto}
.chart-svg{display:block}
.chart-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#9a9690}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Stats log table */
.stats-log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e8e4dc;font-size:12px}
.stats-log-date{color:#9a9690;width:90px;flex-shrink:0}
.stats-log-vals{display:flex;gap:10px;flex-wrap:wrap;flex:1}
.stats-log-val{font-weight:700;color:#1a1814}
.stats-log-bf{color:#c8960a;font-size:11px}
.btn-del-stat{background:none;border:none;color:#ddd;font-size:18px;padding:0 4px;line-height:1}
.btn-del-stat:hover{color:#c03030}
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1814;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.btn-report{width:100%;padding:14px;background:#1a1814;border:none;border-radius:12px;color:#c8960a;font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-report:hover{background:#2a2820}
/* USER MENU */
.user-menu{position:fixed;top:56px;right:12px;background:#fff;border:1.5px solid #ddd9d0;border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:200;min-width:200px;display:none}

/* ═══ SESSION CLOCK ═══ */
function startSessionClock(){
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionClockInterval=setInterval(()=>{
    if(S.sessionStartTs){
      S.sessionElapsedMs=Date.now()-S.sessionStartTs;
      const badge=document.getElementById("session-clock");
      if(badge)badge.textContent="&#x23F1; "+fmtDuration(S.sessionElapsedMs);
    }
  },1000);
}
function fmtDuration(ms){const t=Math.floor(ms/1000);const m=Math.floor(t/60),s=t%60;return `${m}:${s.toString().padStart(2,"0")}`;}
function fmtSecs(s){const m=Math.floor(s/60),r=s%60;return `${m}:${r.toString().padStart(2,"0")}`;}

/* ═══ REST TIMER ═══ */
function startRestTimer(exId,setIdx,targetSecs){
  const key=`${exId}_${setIdx}`;
  if(S.activeTimers[key]&&S.activeTimers[key].status==="running"){
    // cancel if already running
    clearInterval(S.activeTimers[key].interval);
    delete S.activeTimers[key];
    refreshTimerBtn(exId,setIdx);
    return;
  }
  // cancel any other running timer for this exercise
  Object.keys(S.activeTimers).forEach(k=>{
    if(k.startsWith(exId+"_")&&S.activeTimers[k].status==="running"){
      clearInterval(S.activeTimers[k].interval);
      delete S.activeTimers[k];
    }
  });
  let secs=targetSecs;
  S.activeTimers[key]={secs,targetSecs,status:"running",interval:null};
  S.activeTimers[key].interval=setInterval(()=>{
    secs--;
    S.activeTimers[key].secs=secs;
    refreshTimerBtn(exId,setIdx);
    if(secs<=0){
      clearInterval(S.activeTimers[key].interval);
      S.activeTimers[key].status="done";
      playChime();
      refreshTimerBtn(exId,setIdx);
    }
  },1000);
  refreshTimerBtn(exId,setIdx);
}
function refreshTimerBtn(exId,setIdx){
  const key=`${exId}_${setIdx}`;
  const btn=document.getElementById(`rtbtn_${exId}_${setIdx}`);
  if(!btn)return;
  const t=S.activeTimers[key];
  if(!t){btn.textContent="Rest";btn.className="btn-rest";return;}
  if(t.status==="running"){
    btn.textContent=fmtSecs(Math.max(0,t.secs));
    btn.className="btn-rest running";
  }else{
    btn.textContent="Done &#x2713;";
    btn.className="btn-rest done";
    setTimeout(()=>{delete S.activeTimers[key];if(btn)btn.textContent="Rest",btn.className="btn-rest";},4000);
  }
}
function playChime(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1047,0.3]].forEach(([freq,delay])=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type="sine";
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+delay+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+0.65);
    });
  }catch(e){}
}

function kgToW(kg){if(!kg&&kg!==0)return"";if(S.units.weight==="lbs")return(kg*2.20462).toFixed(1);return kg.toFixed(1);}
function wToKg(v){if(S.units.weight==="lbs")return v/2.20462;return parseFloat(v);}
function cmToM(cm){if(!cm&&cm!==0)return"";if(S.units.measure==="in")return(cm/2.54).toFixed(1);return cm.toFixed(1);}
function mToCm(v){if(S.units.measure==="in")return v*2.54;return parseFloat(v);}

/* ═══ SCIENCE CALCS ═══ */
function navyBF(waistCm,neckCm,heightCm){
  if(!waistCm||!neckCm||!heightCm||waistCm<=neckCm)return null;
  // Using cm directly with the cm-adjusted formula
  const waistIn=waistCm*0.393701,neckIn=neckCm*0.393701,htIn=heightCm*0.393701;
  const bf=86.010*Math.log10(waistIn-neckIn)-70.041*Math.log10(htIn)+36.76;
  return Math.max(3,Math.min(50,parseFloat(bf.toFixed(1))));
}
function kinoIdeal(heightCm){return heightCm*0.447;}
function calcMacros(weightKg,bf,phase){
  if(!weightKg||!bf)return null;
  const lbmKg=weightKg*(1-bf/100);
  const bmr=370+(21.6*lbmKg);
  const maint=bmr*1.375;
  let cal;
  if(phase==="cut")cal=maint*0.85;
  else if(phase==="bulk")cal=maint+300;
  else cal=maint;
  cal=Math.round(cal);
  const protein=Math.round(weightKg*2.2);
  const fat=Math.round((cal*0.20)/9);
  const proteinCal=protein*4,fatCal=fat*9;
  const carbs=Math.max(0,Math.round((cal-proteinCal-fatCal)/4));
  return{cal,protein,fat,carbs,lbmKg:parseFloat(lbmKg.toFixed(1)),maint:Math.round(maint)};
}
function calcVolume(sessionData,workoutExercises){
  let vol=0;
  workoutExercises.forEach(ex=>{
    const ed=sessionData[ex.id];
    if(!ed)return;
    ex.workingSets.forEach((_,i)=>{
      const s=ed[i];
      if(!s||!s.reps)return;
      const r=parseFloat(s.reps)||0;
      const kg=s.kg?parseFloat(s.kg)||0:0;
      // For bodyweight exercises with no weight, count reps only (plot separately)
      if(ex.isWeightedBW&&kg===0){vol+=r*1;}// treat as 1kg token
      else{vol+=r*kg;}
    });
  });
  return Math.round(vol);
}

/* ═══ SESSION KEY ═══ */
function getActiveSessionKey(){
  // Use the immutable start date captured when workout began
  if(S.sessionStartDate)return`${S.activeWkId}_${S.sessionStartDate}`;
  // No active session - return null-like sentinel so rWorkout shows Start screen
  return null;
}
function buildNewSessionKey(){
  // Build a unique key for a new session. If today already has a finished session,
  // append a counter to avoid collision (e.g. A_2026-05-27_2)
  const base=`${S.activeWkId}_${new Date().toISOString().slice(0,10)}`;
  if(!S.log[base]||!S.log[base].finished)return base;
  let n=2;
  while(S.log[`${base}_${n}`]&&S.log[`${base}_${n}`].finished)n++;
  return`${base}_${n}`;
}

/* ═══ RENDER WORKOUT TAB ═══ */
function rWorkout(){
  const wk=WORKOUTS.find(w=>w.id===S.activeWkId);
  const sk=getActiveSessionKey(); // null if no active session
  const ts=sk?S.log[sk]||{}:{};
  const fin=sk?!!ts.finished:false;
  const isActive=!!S.sessionStartDate;

  // Previous session for this workout type
  const prevKey=Object.keys(S.log).filter(k=>k.startsWith(S.activeWkId+"_")&&k!==sk&&S.log[k]?.finished).sort().reverse()[0]||null;
  const ps=prevKey?S.log[prevKey]:{};

  const n=wk.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;

  // Workout selector
  const sel=`<div class="workout-selector"><div class="workout-tabs">${WORKOUTS.map(w=>{
    const a=w.id===S.activeWkId,h=Object.keys(S.log).some(k=>k.startsWith(w.id+"_")&&S.log[k]?.finished);
    return`<button class="wk-btn${a?" active":""}" style="${a?`background:${w.accent};border-color:${w.accent}`:""}" onclick="setWk('${w.id}')"><div class="wk-emoji">${w.emoji}</div><div>${w.label}</div>${h&&!a?`<div class="wk-dot"></div>`:""}</button>`;
  }).join("")}</div></div>`;

  if(!isActive&&!fin){
    // Show "Start Workout" screen
    const prevDateStr=prevKey?prevKey.split("_")[1]:null;
    const prevVol=prevKey?calcVolume(S.log[prevKey]||{},wk.exercises):0;
    return sel+`<div class="start-screen"><div class="start-card">
      <div class="start-card-emoji">${wk.emoji}</div>
      <div class="start-card-title">${wk.name}</div>
      <div class="start-card-sub">${wk.subtitle}</div>
      ${prevDateStr?`<div class="start-card-prev">&#x1F4CB; Last: ${prevDateStr} &mdash; ${prevVol}kg volume</div>`:""}
      <button class="btn-start-workout" onclick="startWorkout()">&#x25B6; Start ${wk.name}</button>
    </div></div>`;
  }

  // Session in progress or finished
  const vol=calcVolume(ts,wk.exercises);
  const sessionHeader=`<div class="session-header">
    <div class="session-title" style="color:${wk.accent}">${wk.name} &mdash; ${wk.label}</div>
    <div class="session-sub">${wk.subtitle}</div>
    <div class="session-meta">
      ${isActive&&!fin?`<span class="session-timer-badge" id="session-clock">&#x23F1; 0:00</span>`:""}
      ${fin?`<span class="finished-badge">&#x2713; Finished &mdash; ${vol}kg volume</span>`:`<span style="font-size:11px;color:#9a9690">${vol>0?vol+"kg logged":""}</span>`}
      ${prevKey?`<span class="prev-badge">&#x1F4CB; Prev: ${prevKey.split("_")[1]}</span>`:""}
    </div>
  </div>`;

  const warmup=`<div class="warmup-box"><div class="warmup-title">General Warm-Up &mdash; 5&ndash;8 min</div>${wk.warmup.map(w=>`<div class="warmup-item"><span class="warmup-arrow">&rarr;</span>${w}</div>`).join("")}</div>`;
  const rptNote=`<div class="rpt-note"><div class="rpt-note-title">RPT &mdash; Heaviest set first</div><div class="rpt-note-body"><strong>RPT:</strong> Heaviest set first, drop 10&ndash;15% each set. Hit top of rep range &rarr; add weight next session.<br/><strong>Straight:</strong> Same weight across all sets. Hit top of range on all sets &rarr; add weight next session. Always log in <strong>kg</strong>.</div></div>`;
  const cards=`<div class="ex-list">${wk.exercises.map(ex=>exCard(ex,ts,ps)).join("")}</div>`;

  let bb="";
  if(isActive&&!fin)bb+=`<button style="width:100%;padding:10px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#9a9690;font-size:12px;font-weight:600;margin-bottom:2px" onclick="cancelWorkout()">&#x2715; Discard &amp; Cancel Session</button>`;

  if(fin){
    bb+=`<div class="btn-finished-state">&#x2713; ${wk.name} complete &mdash; ${vol}kg total volume</div>`;
    bb+=`<button class="btn-start-workout" style="margin-top:8px" onclick="startNewSession()">&#x25B6; Start New ${wk.name} Session</button>`;
  }
  // Clear button ONLY for in-progress (not finished) sessions with data

      <div class="info-box-title" style="color:#a07020">RPT Progression Rule</div>
      <div class="info-box-body">Hit the top of every rep range on all sets &rarr; add weight to Set 1 next session. Everything else auto-adjusts at &ndash;10&ndash;15%.</div>
    </div>
  </div>`;
}

/* ═══ RENDER STATS TAB ═══ */
function rStats(){
  const p=S.profile,stats=p.stats||[];
  const latest=stats.length?stats[stats.length-1]:null;
  const hCm=p.heightCm||null,nCm=p.neckCm||null;

  /* UNIT TOGGLES */
  const unitRow=`<div style="margin-bottom:18px">
    <div style="font-size:10px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;font-weight:600;margin-bottom:8px">Body Stats Display Units</div>
    <div class="unit-row" style="margin-bottom:0">

        </div>

      <div style="display:flex;flex-direction:column;gap:4px">

        </div>

    </div>

  </div>`;

  /* PROFILE CARD */
  const profileCard=`<div class="stats-card">
    <div class="stats-card-title">&#x1F4CF; Your Profile</div>
    <div class="stats-input-row">
      <div class="stats-field"><div class="stats-label">Height (${mLbl()})</div><input class="stats-input" id="inp-height" type="number" inputmode="decimal" placeholder="${mLbl()}" value="${hCm?cmToM(hCm):""}" /></div>
      <div class="stats-field"><div class="stats-label">Neck (${mLbl()})</div><input class="stats-input" id="inp-neck" type="number" inputmode="decimal" placeholder="${mLbl()}" value="${nCm?cmToM(nCm):""}" /></div>
      <button class="btn-log-stats" onclick="saveProfile()">Save</button>
    </div>
    <div style="font-size:11px;color:#9a9690;line-height:1.7;font-style:italic">Neck: wrap tape just below the Adam&rsquo;s apple. These rarely change &mdash; set once.</div>
  </div>`;

  /* LOG CHECK-IN */
  const logCard=`<div class="stats-card">
    <div class="stats-card-title">&#x1F4DD; Log Check-In</div>
    <div class="stats-input-row">
      <div class="stats-field"><div class="stats-label">Weight (${wLbl()})</div><input class="stats-input" id="inp-weight" type="number" inputmode="decimal" placeholder="${wLbl()}" /></div>
      <div class="stats-field"><div class="stats-label">Waist (${mLbl()})</div><input class="stats-input" id="inp-waist" type="number" inputmode="decimal" placeholder="${mLbl()}" /></div>
      <button class="btn-log-stats" onclick="logStats()">Log</button>
    </div>
    <div style="font-size:11px;color:#9a9690;line-height:1.6;margin-top:4px">
      Height &amp; neck snapshotted from your profile (${hCm?cmToM(hCm)+mLbl():"not set"} / ${nCm?cmToM(nCm)+mLbl():"not set"}).
      Update profile above if they&rsquo;ve changed before logging.
    </div>
  </div>`;

  /* RESULTS */
  let resultsHtml="";
  if(latest&&hCm&&nCm){
    // Use snapshotted values from entry — falls back to current profile if old entry predates fix
    const entryNeck=latest.neckCm||nCm,entryHt=latest.heightCm||hCm;
    const bf=navyBF(latest.waistCm,entryNeck,entryHt);
    const wKg=latest.weightKg;
    const fatKg=bf?parseFloat((wKg*bf/100).toFixed(1)):null;
    const leanKg=fatKg?parseFloat((wKg-fatKg).toFixed(1)):null;
    const kino=entryHt?{ideal:kinoIdeal(entryHt),excessCm:Math.max(0,latest.waistCm-kinoIdeal(entryHt))}:null;
    const exIn=kino?(kino.excessCm/2.54):0;
    const fatToLose=kino?parseFloat((exIn*5*0.453592).toFixed(1)):0; // in kg
    let bfCls="go";if(bf>25)bfCls="ba";else if(bf>20)bfCls="wa";else if(bf>15)bfCls="hi";
    let ratioColor=exIn<=0?"#2a7a3a":exIn<1?"#a06000":"#c03030";
    let ratioMsg=exIn<=0?"&#x2705; At or below ideal waist":exIn<1?`&#x26A0;&#xFE0F; ${exIn.toFixed(1)}&Prime; above ideal &mdash; ~${fatToLose}kg to lose`:`&#x1F525; ${exIn.toFixed(1)}&Prime; above ideal &mdash; ~${fatToLose}kg to cut`;

    resultsHtml=`<div class="stats-card">
      <div class="stats-card-title">&#x1F3AF; Results &mdash; ${latest.date}</div>
      <div class="results-grid">
        <div class="result-tile hi"><div class="result-lbl">Body Weight</div><div class="result-val">${kgToW(wKg)}</div><div class="result-sub">${wLbl()}</div></div>
        <div class="result-tile ${bfCls}"><div class="result-lbl">Body Fat %</div><div class="result-val">${bf?bf+"%":"&mdash;"}</div><div class="result-sub">US Navy</div></div>
        <div class="result-tile wa"><div class="result-lbl">Fat Mass</div><div class="result-val">${fatKg?kgToW(fatKg):"&mdash;"}</div><div class="result-sub">${wLbl()}</div></div>
        <div class="result-tile go"><div class="result-lbl">Lean Mass</div><div class="result-val">${leanKg?kgToW(leanKg):"&mdash;"}</div><div class="result-sub">${wLbl()}</div></div>
      </div>
      ${kino?`<div class="kino-bar-wrap">
        <div class="stats-card-title" style="margin-top:6px;margin-bottom:8px">&#x1F4D0; Kinobody Waist Ratio</div>
        <div class="kino-bar-labels"><span>Current: ${(latest.waistCm/entryHt*100).toFixed(1)}% of height</span><span style="color:#2a7a3a">&#x2193; Ideal: 44.7%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#bbb;margin-bottom:3px"><span>35%</span><span>45%</span><span>55%</span></div>
        <div class="kino-bar-track">
          <div class="kino-bar-fill" style="width:${Math.min(100,Math.max(0,((latest.waistCm/entryHt*100-35)/20)*100)).toFixed(1)}%;background:${ratioColor}"></div>
          <div class="kino-marker" style="left:${(((44.7-35)/20)*100).toFixed(1)}%"></div>
        </div>
        <div class="kino-status" style="color:${ratioColor}">${ratioMsg}</div>
        <div style="font-size:11px;color:#9a9690;margin-top:4px">Ideal waist: ${cmToM(kino.ideal).toString().slice(0,4)}${mLbl()}&nbsp;&bull;&nbsp;Yours: ${cmToM(latest.waistCm).toString().slice(0,4)}${mLbl()}</div>
      </div>`:""}
    </div>`;
  }

  /* PHASE + MACROS */
  const phaseDesc={cut:"15% deficit &mdash; fat loss with muscle retention",recomp:"Maintenance &mdash; simultaneous recomp",bulk:"+300 kcal surplus &mdash; clean muscle growth"};
  const phaseHtml=`<div class="stats-card">
    <div class="stats-card-title">&#x1F37D; MyFitnessPal Targets</div>
    <div class="phase-toggle">
      ${["cut","recomp","bulk"].map(ph=>`<button class="phase-btn ${ph}${S.profile.phase===ph?" active":""}" onclick="setPhase('${ph}')">${ph.charAt(0).toUpperCase()+ph.slice(1)}</button>`).join("")}
    </div>
    ${(()=>{
      if(!latest)return`<div style="font-size:13px;color:#9a9690;text-align:center;padding:12px">Log a check-in to see your targets.</div>`;
      const eNeck=latest.neckCm||nCm,eHt=latest.heightCm||hCm;
      const bf=eHt&&eNeck?navyBF(latest.waistCm,eNeck,eHt):null;
      if(!bf)return`<div style="font-size:13px;color:#9a9690;text-align:center;padding:12px">Save your profile (height + neck) to enable macro targets.</div>`;
      const m=calcMacros(latest.weightKg,bf,S.profile.phase);
      if(!m)return"";
      return`<div class="macro-phase-lbl ${S.profile.phase}">Phase: ${phaseDesc[S.profile.phase]}</div>
      <div class="macro-grid">
        <div class="macro-tile"><div class="macro-lbl">Calories</div><div class="macro-val">${m.cal}</div><div class="macro-sub">kcal/day</div></div>
        <div class="macro-tile"><div class="macro-lbl">Protein</div><div class="macro-val">${m.protein}g</div><div class="macro-sub">2.2g &times; kg BW</div></div>
        <div class="macro-tile"><div class="macro-lbl">Carbs</div><div class="macro-val">${m.carbs}g</div><div class="macro-sub">remaining cals</div></div>
        <div class="macro-tile"><div class="macro-lbl">Fats</div><div class="macro-val">${m.fat}g</div><div class="macro-sub">20% of cals</div></div>
      </div>
      <div style="font-size:11px;color:#9a9690;margin-top:10px;line-height:1.6">Maintenance: ${m.maint} kcal &bull; LBM: ${kgToW(m.lbmKg)}${wLbl()} &bull; Based on Katch-McArdle &times; 1.375</div>`;
    })()}
  </div>`;

  /* ═══════════════════════════════════════════
     PROPER CHARTS — axes, grid, tooltips
     ═══════════════════════════════════════════ */
  let chartsHtml="";

  // Chart builder function — returns full HTML string for a chart card
  function buildChart({title, series, labels, yUnit="", colorScheme=[], dashed=[], cardId=""}){
    // series = [{values:[...], label:"", color:"#xxx"}]
    // labels = date strings for x-axis
    const n=labels.length;
    if(n===0)return"";

    const CW=320, CH=160;
    const padL=52, padR=12, padT=12, padB=32;
    const plotW=CW-padL-padR, plotH=CH-padT-padB;

    // Flatten all values to get y scale
    const allVals=series.flatMap(s=>s.values).filter(v=>v!=null&&!isNaN(v));
    if(!allVals.length)return"";
    const rawMin=Math.min(...allVals), rawMax=Math.max(...allVals);
    const range=rawMax-rawMin||1;
    const yMin=parseFloat((rawMin-range*0.15).toFixed(1));
    const yMax=parseFloat((rawMax+range*0.15).toFixed(1));
    const yRange=yMax-yMin;

    function xPos(i){return padL+i/(n-1||1)*plotW;}
    function yPos(v){return padT+plotH-(((v-yMin)/yRange)*plotH);}

    // Y axis ticks — 4 ticks
    const yTicks=4;
    let gridLines="",yAxisLabels="";
    for(let t=0;t<=yTicks;t++){
      const v=yMin+(t/yTicks)*yRange;
      const y=yPos(v);
      gridLines+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${CW-padR}" y2="${y.toFixed(1)}" stroke="#e8e4dc" stroke-width="1"/>`;
      yAxisLabels+=`<text x="${padL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" style="font-size:9px;fill:#9a9690;font-family:Courier New">${v.toFixed(1)}${yUnit}</text>`;
    }

    // X axis labels — show first, middle, last
    let xAxisLabels="";
    const xIdxs=[0, Math.floor((n-1)/2), n-1].filter((v,i,a)=>a.indexOf(v)===i);
    xIdxs.forEach(i=>{
      const lbl=(labels[i]||"").slice(5); // MM-DD
      const x=xPos(i);
      xAxisLabels+=`<text x="${x.toFixed(1)}" y="${CH-6}" text-anchor="middle" style="font-size:9px;fill:#9a9690;font-family:Courier New">${lbl}</text>`;
    });

    // Draw axes
    const axes=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#ddd9d0" stroke-width="1.5"/>
    <line x1="${padL}" y1="${padT+plotH}" x2="${CW-padR}" y2="${padT+plotH}" stroke="#ddd9d0" stroke-width="1.5"/>`;

    // Draw series
    let seriesSvg="";
    series.forEach((s,si)=>{
      if(!s.values.some(v=>v!=null))return;
      const dash=dashed[si]?"6,4":"";
      // Line
      let pathD="";
      s.values.forEach((v,i)=>{
        if(v==null)return;
        const x=xPos(i).toFixed(1),y=yPos(v).toFixed(1);
        pathD+=pathD?"L"+x+","+y:"M"+x+","+y;
      });
      if(pathD)seriesSvg+=`<path d="${pathD}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"${dash?` stroke-dasharray="${dash}"`:""} stroke-linecap="round"/>`;
      // Dots with tooltip data
      s.values.forEach((v,i)=>{
        if(v==null)return;
        const x=xPos(i).toFixed(1),y=yPos(v).toFixed(1);
        const tipText=`${labels[i]||""}: ${v.toFixed(1)}${yUnit} (${s.label})`;
        seriesSvg+=`<circle cx="${x}" cy="${y}" r="4" fill="${s.color}" stroke="#fff" stroke-width="1.5"
          onclick="showChartTip('${cardId}','${tipText}')"
          ontouchstart="showChartTip('${cardId}','${tipText}')"
          style="cursor:pointer"/>`;
      });
    });

    // Legend
    const legendHtml=series.map((s,si)=>`<div class="legend-item"><div class="legend-dot" style="background:${s.color};${dashed[si]?"border:2px dashed "+s.color+";background:transparent;width:14px;height:6px;border-radius:0":""}"></div>${s.label}</div>`).join("");

    return`<div class="stats-card" id="card_${cardId}">
      <div class="stats-card-title">${title}</div>
      <div id="tip_${cardId}" style="display:none;font-size:12px;font-weight:700;color:#1a1814;background:#fef9e8;border:1px solid #e8c870;border-radius:6px;padding:5px 12px;margin-bottom:8px;text-align:center"></div>
      <div class="chart-wrap" style="overflow-x:auto">
        <svg viewBox="0 0 ${CW} ${CH}" width="100%" style="min-width:260px;max-width:100%;display:block">
          ${gridLines}${axes}${seriesSvg}${yAxisLabels}${xAxisLabels}
        </svg>
      </div>
      <div class="chart-legend" style="margin-top:8px">${legendHtml}</div>
    </div>`;
  }

  // Graph 1: Recomp — split into two charts so each has its own Y scale
  if(stats.length>1&&hCm&&nCm){
    const pts=stats.slice(-12);
    const leans=pts.map(s=>{const sNeck=s.neckCm||nCm,sHt=s.heightCm||hCm;const bf=navyBF(s.waistCm,sNeck,sHt);return bf?parseFloat((s.weightKg*(1-bf/100)).toFixed(1)):null;});
    const fats=pts.map(s=>{const sNeck=s.neckCm||nCm,sHt=s.heightCm||hCm;const bf=navyBF(s.waistCm,sNeck,sHt);return bf?parseFloat((s.weightKg*bf/100).toFixed(1)):null;});
    const weights=pts.map(s=>parseFloat(kgToW(s.weightKg)));
    const waists=pts.map(s=>parseFloat(cmToM(s.waistCm)));
    const lbls=pts.map(s=>s.date);
    if(leans.filter(Boolean).length>1){
      // Chart 1a: Lean mass trend (most important — want this going UP)
      chartsHtml+=buildChart({
        title:"&#x1F4AA; Lean Mass Trend",
        series:[{values:leans,label:"Lean Mass ("+wLbl()+")",color:"#2a7a3a"}],
        labels:lbls, yUnit:wLbl(), dashed:[false], cardId:"lean"
      });
      // Chart 1b: Fat mass + bodyweight (want fat going DOWN, weight stable/down)
      chartsHtml+=buildChart({
        title:"&#x1F525; Fat Mass vs Body Weight",
        series:[
          {values:weights,label:"Body Weight ("+wLbl()+")",color:"#c8960a"},
          {values:fats,label:"Fat Mass ("+wLbl()+")",color:"#c03030"}
        ],
        labels:lbls, yUnit:wLbl(), dashed:[false,true], cardId:"fat"
      });
      // Chart 1c: Waist circumference trend
      if(waists.filter(Boolean).length>1){
        chartsHtml+=buildChart({
          title:"&#x1F4D0; Waist Circumference",
          series:[{values:waists,label:"Waist ("+mLbl()+")",color:"#1a7fa8"}],
          labels:lbls, yUnit:mLbl(), dashed:[false], cardId:"waist"
        });
      }
    }
  }

  // Graph 2: Strength — works as soon as 2+ finished sessions exist, no body stats needed
  {
    const anchorEx=S.strengthAnchor;
    const wkId=anchorEx[0];
    const anchorWk=WORKOUTS.find(w=>w.id===wkId);
    const anchorExObj=anchorWk?.exercises.find(e=>e.id===anchorEx);
    const finishedSessions=Object.entries(S.log)
      .filter(([k,d])=>d.finished&&k.startsWith(wkId+"_"))
      .sort((a,b)=>a[0].localeCompare(b[0]))
      .slice(-12);
    const strengthPts=finishedSessions.map(([key,d])=>{
      const ed=d[anchorEx];
      if(ed&&(ed[0]?.kg||ed[0]?.reps)){
        const w=ed[0].kg?parseFloat(ed[0].kg):null;
        const r=ed[0].reps?parseFloat(ed[0].reps):null;
        if(w&&r)return parseFloat((w+w*r*0.0333).toFixed(1)); // Epley 1RM estimate
        if(r)return r; // BW move — plot raw reps
      }
      return null;
    });
    // Bodyweight overlay — null if no body stats for that date
    const bodyweightPts=finishedSessions.map(([key])=>{
      const date=key.split("_")[1];
      const sv=stats.find(s=>s.date===date);
      return sv?parseFloat(kgToW(sv.weightKg)):null;
    });
    if(strengthPts.filter(Boolean).length>=2){
      const sessionLabels=finishedSessions.map(([k])=>k.split("_")[1]);
      const anchorBtns=["A1","B1"].map(id=>{
        const wk2=WORKOUTS.find(w=>w.id===id[0]);
        const ex2=wk2?.exercises.find(ex=>ex.id===id);
        if(!ex2)return"";
        const active=S.strengthAnchor===id;
        return`<button style="padding:6px 12px;font-size:11px;font-weight:700;border:1.5px solid ${active?"#c8960a":"#ddd9d0"};border-radius:7px;background:${active?"#fef9e8":"#f5f4f0"};color:${active?"#8a6a00":"#5a5650"};cursor:pointer;margin-bottom:10px" onclick="setAnchor('${id}')">${ex2.name}</button>`;
      }).join("");
      const strengthSeries=[{values:strengthPts,label:"Est. 1RM (kg)",color:"#c8960a"}];
      if(bodyweightPts.some(Boolean))strengthSeries.push({values:bodyweightPts,label:"Bodyweight ("+wLbl()+")",color:"#9a9690"});
      const strengthChart=buildChart({
        title:"&#x1F4AA; Strength Progress (Est. 1RM)",
        series:strengthSeries,
        labels:sessionLabels, yUnit:"kg", dashed:[false,true], cardId:"strength"
      });
      // Insert anchor buttons after title
      chartsHtml+=strengthChart.replace(
        '<div class="chart-wrap"',
        `<div style="display:flex;gap:8px;flex-wrap:wrap">${anchorBtns}</div><div class="chart-wrap"`
      );
      if(strengthPts.filter(Boolean).length<3)chartsHtml+=`<div style="font-size:11px;color:#9a9690;margin-top:-8px;margin-bottom:10px;padding:0 16px;font-style:italic">Keep logging &mdash; trend builds after 3+ sessions.</div>`;
    } else if(strengthPts.filter(Boolean).length===1){
      chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F4AA; Strength Progress (Est. 1RM)</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          ${["A1","B1"].map(id=>{const wk2=WORKOUTS.find(w=>w.id===id[0]);const ex2=wk2?.exercises.find(ex=>ex.id===id);if(!ex2)return"";const active=S.strengthAnchor===id;return`<button style="padding:6px 12px;font-size:11px;font-weight:700;border:1.5px solid ${active?"#c8960a":"#ddd9d0"};border-radius:7px;background:${active?"#fef9e8":"#f5f4f0"};color:${active?"#8a6a00":"#5a5650"};cursor:pointer" onclick="setAnchor('${id}')">${ex2.name}</button>`;}).join("")}
        </div>
        <div style="font-size:13px;color:#9a9690;padding:8px 0;line-height:1.7">1 session logged. Complete one more ${wkId==="A"?"Workout A":"Workout B"} to see your strength trend.</div>
      </div>`;
    } else {
      // Zero sessions for this anchor — show placeholder with switcher still visible
      chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F4AA; Strength Progress (Est. 1RM)</div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          ${["A1","B1"].map(id=>{const wk2=WORKOUTS.find(w=>w.id===id[0]);const ex2=wk2?.exercises.find(ex=>ex.id===id);if(!ex2)return"";const active=S.strengthAnchor===id;return`<button style="padding:6px 12px;font-size:11px;font-weight:700;border:1.5px solid ${active?"#c8960a":"#ddd9d0"};border-radius:7px;background:${active?"#fef9e8":"#f5f4f0"};color:${active?"#8a6a00":"#5a5650"};cursor:pointer" onclick="setAnchor('${id}')">${ex2.name}</button>`;}).join("")}
        </div>
        <div style="font-size:13px;color:#9a9690;padding:16px 0;text-align:center;line-height:1.7;font-style:italic">No ${wkId==="A"?"Workout A":"Workout B"} sessions logged yet.<br/>Complete a session to start tracking ${anchorExObj?.name||"this lift"}.</div>
      </div>`;
    }
  }

  // Graph 3: Session Tonnage — filterable by workout, with date labels
  {
    const colors={"A":"#c8960a","B":"#1a7fa8","C":"#b83030"};
    const activeFilter=S.tonnageFilter||"A";
    const filtSessions=Object.entries(S.log)
      .filter(([k,d])=>d.finished&&k.startsWith(activeFilter+"_"))
      .sort((a,b)=>a[0].localeCompare(b[0]))
      .slice(-10);
    const wkForTon=WORKOUTS.find(w=>w.id===activeFilter);
    const tonnageVals=filtSessions.map(([k,d])=>calcVolume(d,wkForTon.exercises));
    const tonnageDates=filtSessions.map(([k])=>k.split("_")[1]);
    const anySession=Object.values(S.log).some(d=>d.finished);
    if(anySession){
      // Workout filter buttons
      const filterBtns=WORKOUTS.map(w=>`<button style="padding:5px 12px;font-size:11px;font-weight:700;border:1.5px solid ${activeFilter===w.id?colors[w.id]:"#ddd9d0"};border-radius:7px;background:${activeFilter===w.id?"#fef9e8":"#f5f4f0"};color:${activeFilter===w.id?colors[w.id]:"#5a5650"};cursor:pointer" onclick="setTonnageFilter('${w.id}')">${w.emoji} ${w.name}</button>`).join("");
      if(tonnageVals.length>=2){
        const tonChart=buildChart({
          title:"&#x1F3CB; Session Tonnage (kg)",
          series:[{values:tonnageVals,label:wkForTon.name+" volume (kg)",color:colors[activeFilter]}],
          labels:tonnageDates, yUnit:"kg", dashed:[false], cardId:"tonnage"
        });
        chartsHtml+=tonChart.replace(
          '<div class="chart-wrap"',
          `<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">${filterBtns}</div><div class="chart-wrap"`
        );
      } else {
        chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F3CB; Session Tonnage (kg)</div>
          <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">${filterBtns}</div>
          ${tonnageVals.length===0?`<div style="font-size:13px;color:#9a9690;padding:16px 0;text-align:center;font-style:italic">No ${wkForTon.name} sessions yet. Complete 2+ sessions to see the trend.</div>`:`<div style="font-size:13px;color:#9a9690;padding:12px 0;text-align:center;font-style:italic">1 session logged. Need 2+ to draw a trend line.</div>`}
        </div>`;
      }
    }
  }

  /* LOG TABLE */
  let logHtml="";
  if(stats.length){
    const rows=[...stats].reverse().slice(0,10).map((s,i)=>{
      const sNeck=s.neckCm||nCm,sHt=s.heightCm||hCm;
      const bf=sHt&&sNeck?navyBF(s.waistCm,sNeck,sHt):null;
      const ri=stats.length-1-i;
      return`<div class="stats-log-row"><span class="stats-log-date">${s.date}</span><div class="stats-log-vals"><span class="stats-log-val">${kgToW(s.weightKg)}${wLbl()}</span><span class="stats-log-val">${cmToM(s.waistCm).toString().slice(0,4)}${mLbl()}</span>${bf?`<span class="stats-log-bf">${bf}% BF</span>`:""}</div><button class="btn-del-stat" onclick="delStat(${ri})">&times;</button></div>`;
    }).join("");
    logHtml=`<div class="stats-card"><div class="stats-card-title">&#x1F4C5; Check-In Log</div>${rows}</div>`;
  }

  const reportBtn=`<button class="btn-report" onclick="generateWeeklyReport()">&#x1F4CA; Generate Weekly Report</button>`;
  return`<div class="stats-wrap">${reportBtn}${unitRow}${profileCard}${logCard}${resultsHtml}${phaseHtml}${chartsHtml}${logHtml}</div>`;
}

/* ═══ MODAL ═══ */
function rModal(){
  if(!S.showFinishModal)return"";
  const wk=WORKOUTS.find(w=>w.id===S.activeWkId);
  const sk=getActiveSessionKey();if(!sk)return"";const ts=S.log[sk]||{};
  const n=wk.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;
  const vol=calcVolume(ts,wk.exercises);
  const dur=S.sessionStartTs?fmtDuration(Date.now()-S.sessionStartTs):"";
  return`<div class="modal-overlay" onclick="closeFin()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-icon">&#x1F3C1;</div>
    <div class="modal-title">Finish ${wk.name}?</div>

        return`<div class="sb-stat-pill" style="margin-top:6px;background:#f8f6f2;border-color:#e0dcd4">

/* ═══ ACTIONS ═══ */
window.setTab=t=>{S.tab=t;render();};
window.setWk=id=>{
  // switching workout resets session state if different workout
  if(id!==S.activeWkId){
    if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
    S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;S.activeTimers={};
  }
  S.activeWkId=id;S.confirmClear=false;render();
};
window.togEx=id=>{S.openEx[id]=!S.openEx[id];render();};
window.setCC=v=>{S.confirmClear=v;render();};
window.setDC=k=>{S.confirmDeleteKey=k;render();};
window.openFin=()=>{S.showFinishModal=true;render();};
window.closeFin=()=>{S.showFinishModal=false;render();};
window.setUnit=(t,v)=>{S.units[t]=v;render();};
window.setPhase=async ph=>{S.profile.phase=ph;await fbSaveProfile(S.profile);render();};
window.setAnchor=id=>{S.strengthAnchor=id;render();};

window.startWorkout=()=>{
  const now=new Date();
  // Build a unique key (handles same-day repeat sessions)
  const newKey=buildNewSessionKey();
  // Extract just the date+suffix part after the workout ID
  S.sessionStartDate=newKey.replace(S.activeWkId+"_",""); // e.g. "2026-05-27" or "2026-05-27_2"
  S.sessionStartTs=Date.now();
  S.sessionElapsedMs=0;
  const sk=getActiveSessionKey();
  if(!S.log[sk])S.log[sk]={startedAt:now.toISOString()};
  startSessionClock();
  render();
};

window.startRest=(exId,setIdx,secs)=>{startRestTimer(exId,setIdx,secs);};

window.updWu=async(eid,i,field,val)=>{
  const sk=getActiveSessionKey();
  if(!sk)return;
  if(!S.log[sk])S.log[sk]={};
  const wuKey=eid+"_wu";
  if(!S.log[sk][wuKey])S.log[sk][wuKey]={};
  if(!S.log[sk][wuKey][i])S.log[sk][wuKey][i]={};
  S.log[sk][wuKey][i][field]=val;
  await fbSave(sk,S.log[sk]);
};

window.updDrop=async(eid,field,val)=>{
  const sk=getActiveSessionKey();
  if(!sk)return;
  if(!S.log[sk])S.log[sk]={};
  if(!S.log[sk][eid])S.log[sk][eid]={};
  if(!S.log[sk][eid]["drop"])S.log[sk][eid]["drop"]={};
  S.log[sk][eid]["drop"][field]=val;
  await fbSave(sk,S.log[sk]);
};

window.updSet=async(eid,i,field,val)=>{
  const sk=getActiveSessionKey();
  if(!sk)return; // No active session
  if(!S.log[sk])S.log[sk]={};
  if(!S.log[sk][eid])S.log[sk][eid]={};
  if(!S.log[sk][eid][i])S.log[sk][eid][i]={};
  S.log[sk][eid][i][field]=val;
  await fbSave(sk,S.log[sk]);
};

window.finSess=async()=>{
  const sk=getActiveSessionKey();
  if(!sk)return;
  if(!S.log[sk])S.log[sk]={};
  S.log[sk].finished=true;
  S.log[sk].finishedAt=new Date().toISOString();
  S.log[sk].durationMs=S.sessionStartTs?Date.now()-S.sessionStartTs:0;
  S.showFinishModal=false;
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  // Cancel all timers
  Object.values(S.activeTimers).forEach(t=>{if(t.interval)clearInterval(t.interval);});
  S.activeTimers={};
  await fbSave(sk,S.log[sk]);
  showToast("&#x2713; Session saved!");render();
};

window.clearSession=async()=>{
  const sk=getActiveSessionKey();
  // Only clear in-progress sessions (not finished ones - those stay in history)
  const sess=S.log[sk];
  if(sess&&sess.finished){showToast("Session already saved to history");S.confirmClear=false;render();return;}
  await fbDel(sk);delete S.log[sk];
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  S.activeTimers={};S.confirmClear=false;
  showToast("In-progress session cleared");render();
};

window.cancelWorkout=async()=>{
  // Discard in-progress session entirely — no save, no history entry
  const sk=getActiveSessionKey();
  if(sk&&S.log[sk]&&!S.log[sk].finished){
    await fbDel(sk);
    delete S.log[sk];
  }
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  S.activeTimers={};S.confirmClear=false;
  showToast("Session discarded");
  render();
};

window.startNewSession=()=>{
  // Reset session state so user can start a fresh session for the same workout type
  // The previous finished session stays safely in history under its own date key
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  S.activeTimers={};S.confirmClear=false;
  render(); // This will show the "Start Workout" screen again
};

window.delSess=async k=>{

window.saveProfile=async()=>{
  const hEl=document.getElementById("inp-height"),nEl=document.getElementById("inp-neck");
  if(!hEl||!nEl)return;
  const hv=parseFloat(hEl.value),nv=parseFloat(nEl.value);

  S.profile.heightCm=mToCm(hv);S.profile.neckCm=mToCm(nv);
  await fbSaveProfile(S.profile);showToast("Profile saved!");render();
};

window.logStats=async()=>{
  const wEl=document.getElementById("inp-weight"),waistEl=document.getElementById("inp-waist");
  if(!wEl||!waistEl)return;
  const wv=parseFloat(wEl.value),waistV=parseFloat(waistEl.value);
  if(!wv||!waistV){showToast("Enter weight and waist");return;}
  if(!S.profile.heightCm||!S.profile.neckCm){showToast("Save your height & neck in profile first");return;}
  // Snapshot height and neck at time of logging — protects historical BF% accuracy
  const entry={
    date:new Date().toISOString().slice(0,10),
    weightKg:wToKg(wv),
    waistCm:mToCm(waistV),
    heightCm:S.profile.heightCm,  // snapshotted at log time
    neckCm:S.profile.neckCm       // snapshotted at log time
  };
  if(!S.profile.stats)S.profile.stats=[];
  const idx=S.profile.stats.findIndex(s=>s.date===entry.date);
  if(idx>=0)S.profile.stats[idx]=entry;else S.profile.stats.push(entry);
  await fbSaveProfile(S.profile);showToast("Check-in logged!");render();
};

window.generateWeeklyReport=()=>{
  const stats=S.profile.stats||[];
  const hCm=S.profile.heightCm,nCm=S.profile.neckCm;
  const phase=S.profile.phase||"recomp";

  // Get last 2 entries for comparison
  const latest=stats.length?stats[stats.length-1]:null;
  const prev=stats.length>1?stats[stats.length-2]:null;

  // Week number since first check-in
  const weekNum=stats.length;

  // BF calcs
  const latestBF=latest&&hCm&&nCm?navyBF(latest.waistCm,latest.neckCm||nCm,latest.heightCm||hCm):null;
  const prevBF=prev&&hCm&&nCm?navyBF(prev.waistCm,prev.neckCm||nCm,prev.heightCm||hCm):null;
  const latestFatKg=latestBF?parseFloat((latest.weightKg*latestBF/100).toFixed(1)):null;
  const latestLeanKg=latestFatKg?parseFloat((latest.weightKg-latestFatKg).toFixed(1)):null;
  const prevFatKg=prevBF?parseFloat((prev.weightKg*prevBF/100).toFixed(1)):null;
  const prevLeanKg=prevFatKg?parseFloat((prev.weightKg-prevFatKg).toFixed(1)):null;
  const macros=latestBF?calcMacros(latest.weightKg,latestBF,phase):null;
  const kino=latest&&hCm?{ideal:kinoIdeal(hCm),ratio:(latest.waistCm/hCm*100).toFixed(1),excessIn:Math.max(0,(latest.waistCm-kinoIdeal(hCm))/2.54).toFixed(1)}:null;

    if(!sessions.length)return null;
    const [,d]=sessions[0];

    return{kg:ed[0].kg||"BW",reps:ed[0].reps||"",date:sessions[0][0].split("_")[1]};
  }
  const benchTop=getLastTopSet("A","A1");

  const phaseLabel={cut:"Cut — 15% deficit",recomp:"Recomp — maintenance",bulk:"Bulk — +300kcal surplus"};

  // Build the report HTML
  const reportHtml=`<!DOCTYPE html>

<div class="header">
  <div class="title">IRON HOME</div>
  <div class="subtitle">Weekly Progress Report &bull; Generated ${new Date().toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
  <div class="week-badge">Week ${weekNum} &bull; ${phaseLabel[phase]||phase}</div>
</div>

<div class="upload-note">
  &#x1F916; Upload this report to Claude for coaching review after 4&ndash;8 weeks of consistent data.<br/>
  The more entries logged, the more accurate and useful the analysis.
</div>

<!-- BODY COMPOSITION -->
<div class="section">
  <div class="section-title">&#x1F3AF; Body Composition</div>
  <div class="grid4">
    <div class="tile gold">
      <div class="tile-lbl">Body Weight</div>
      <div class="tile-val">${latest?kgToW(latest.weightKg):"—"}</div>
      <div class="tile-sub">${wLbl()}</div>
      ${prev?`<div class="tile-delta ${parseFloat(delta(latest.weightKg,prev.weightKg))<=0?"delta-good":"delta-warn"}">${delta(latest.weightKg,prev.weightKg)} ${wLbl()} vs last week</div>`:""}
    </div>
    <div class="tile ${latestBF>25?"red":latestBF>20?"":"green"}">
      <div class="tile-lbl">Body Fat %</div>
      <div class="tile-val">${latestBF?latestBF+"%":"—"}</div>
      <div class="tile-sub">US Navy</div>
      ${prevBF?`<div class="tile-delta ${parseFloat(delta(latestBF,prevBF))<=0?"delta-good":"delta-bad"}">${delta(latestBF,prevBF)}% ${arrow(latestBF,prevBF,"down")}</div>`:""}
    </div>
    <div class="tile red">
      <div class="tile-lbl">Fat Mass</div>
      <div class="tile-val">${latestFatKg?kgToW(latestFatKg):"—"}</div>
      <div class="tile-sub">${wLbl()}</div>
      ${prevFatKg?`<div class="tile-delta ${parseFloat(delta(latestFatKg,prevFatKg))<=0?"delta-good":"delta-bad"}">${delta(latestFatKg,prevFatKg)} ${wLbl()} ${arrow(latestFatKg,prevFatKg,"down")}</div>`:""}
    </div>
    <div class="tile green">
      <div class="tile-lbl">Lean Mass</div>
      <div class="tile-val">${latestLeanKg?kgToW(latestLeanKg):"—"}</div>
      <div class="tile-sub">${wLbl()}</div>
      ${prevLeanKg?`<div class="tile-delta ${parseFloat(delta(latestLeanKg,prevLeanKg))>=0?"delta-good":"delta-bad"}">${delta(latestLeanKg,prevLeanKg)} ${wLbl()} ${arrow(latestLeanKg,prevLeanKg,"up")}</div>`:""}
    </div>
  </div>
  ${latest?`<div class="tile" style="margin-bottom:0">
    <div class="tile-lbl">Kinobody Waist Ratio</div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:700;font-family:Georgia,serif">${kino?kino.ratio:"-"}% <span style="font-size:13px;color:#9a9690">of height (ideal: 44.7%)</span></div>
        <div style="font-size:12px;color:#9a9690;margin-top:2px">Waist: ${cmToM(latest.waistCm)}${mLbl()} &bull; Ideal: ${hCm?cmToM(kinoIdeal(hCm)).toString().slice(0,4):"—"}${mLbl()}</div>
      </div>
      ${kino?(()=>{const ei=parseFloat(kino.excessIn);const col=ei<=0?"#2a7a3a":ei<2?"#c8960a":"#c03030";const msg=ei<=0?"At ideal waist":ei.toFixed(1)+String.fromCharCode(34)+" above ideal";return`<div style="font-size:13px;font-weight:700;color:${col}">${ei<=0?"✅":"🔥"} ${msg}</div>`;})():""}
    </div>
  </div>`:""}
</div>

<!-- WEEKLY TRAINING -->
<div class="section">
  <div class="section-title">&#x1F4AA; Weekly Training</div>
  ${["A","B","C"].map(id=>{
    const wk=WORKOUTS.find(w=>w.id===id);
    const hit=wkHit[id]>0;
    const ton=id==="A"?tonA:id==="B"?tonB:tonC;
    return`<div class="workout-row">
      <div>
        <div class="workout-label">${wk.emoji} ${wk.name} &mdash; ${wk.label}</div>
        <div class="workout-meta">${ton?"Last: "+ton.date:"No sessions yet"}</div>
      </div>
      <div style="text-align:right">
        <div class="${hit?"hit":"miss"}">${hit?"✓ Done":"✗ Missed"}</div>
        ${ton?`<div class="workout-vol">${ton.vol}kg</div>`:""}
      </div>
    </div>`;
  }).join("")}
</div>

<!-- STRENGTH ANCHORS -->
<div class="section">
  <div class="section-title">&#x1F3CB; Strength Anchors (Last Session Top Set)</div>
  ${benchTop?`<div class="lift-row">
    <div><div style="font-size:13px;font-weight:700">DB Bench Press &mdash; Set 1</div><div style="font-size:11px;color:#9a9690">${benchTop.date}</div></div>
    <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:#c8960a">${benchTop.kg}kg x ${benchTop.reps} reps</div><div style="font-size:11px;color:#9a9690">Est. 1RM: ${benchTop.kg&&benchTop.reps?parseFloat((parseFloat(benchTop.kg)+parseFloat(benchTop.kg)*parseFloat(benchTop.reps)*0.0333).toFixed(1)):"n/a"}kg</div></div>
  </div>`:`<div class="lift-row"><div style="font-size:13px;color:#9a9690;font-style:italic">No Workout A sessions yet</div></div>`}
  ${pullupTop?`<div class="lift-row">
    <div><div style="font-size:13px;font-weight:700">Weighted Pull-Ups &mdash; Set 1</div><div style="font-size:11px;color:#9a9690">${pullupTop.date}</div></div>
    <div style="text-align:right"><div style="font-size:16px;font-weight:700;color:#1a7fa8">${pullupTop.kg}kg &times; ${pullupTop.reps} reps</div></div>
  </div>`:`<div class="lift-row"><div style="font-size:13px;color:#9a9690;font-style:italic">No Workout B sessions yet</div></div>`}
</div>

<!-- MACRO TARGETS -->
${macros?`<div class="section">
  <div class="section-title">&#x1F37D; MyFitnessPal Targets This Week</div>
  <span class="phase-badge phase-${phase}">${phaseLabel[phase]||phase}</span>
  <div class="macro-row">
    <div class="macro-tile"><div class="macro-val">${macros.cal}</div><div class="macro-lbl">Calories</div></div>
    <div class="macro-tile"><div class="macro-val">${macros.protein}g</div><div class="macro-lbl">Protein</div></div>
    <div class="macro-tile"><div class="macro-val">${macros.carbs}g</div><div class="macro-lbl">Carbs</div></div>
    <div class="macro-tile"><div class="macro-val">${macros.fat}g</div><div class="macro-lbl">Fats</div></div>
  </div>
</div>`:""}

<!-- ALL CHECK-IN HISTORY -->
${stats.length?`<div class="section">
  <div class="section-title">&#x1F4C5; Full Check-In History</div>
  <table style="width:100%;border-collapse:collapse;font-size:12px">
    <tr style="border-bottom:2px solid #c8960a">
      <th style="text-align:left;padding:6px 8px;color:#9a9690;font-weight:600">Date</th>
      <th style="text-align:right;padding:6px 8px;color:#9a9690;font-weight:600">Weight</th>
      <th style="text-align:right;padding:6px 8px;color:#9a9690;font-weight:600">Waist</th>
      <th style="text-align:right;padding:6px 8px;color:#9a9690;font-weight:600">BF%</th>
      <th style="text-align:right;padding:6px 8px;color:#9a9690;font-weight:600">Fat</th>
      <th style="text-align:right;padding:6px 8px;color:#9a9690;font-weight:600">Lean</th>
    </tr>
    ${[...stats].reverse().map((s,i)=>{
      const sNeck=s.neckCm||nCm,sHt=s.heightCm||hCm;
      const bf=sHt&&sNeck?navyBF(s.waistCm,sNeck,sHt):null;
      const fat=bf?parseFloat((s.weightKg*bf/100).toFixed(1)):null;
      const lean=fat?parseFloat((s.weightKg-fat).toFixed(1)):null;
      const isLatest=i===0;
      return`<tr style="border-bottom:1px solid #e8e4dc;background:${isLatest?"#fef9e8":"transparent"}">
        <td style="padding:7px 8px;font-weight:${isLatest?"700":"400"}">${s.date}${isLatest?" ◀ latest":""}</td>
        <td style="text-align:right;padding:7px 8px;font-weight:700">${kgToW(s.weightKg)}${wLbl()}</td>
        <td style="text-align:right;padding:7px 8px">${cmToM(s.waistCm)}${mLbl()}</td>
        <td style="text-align:right;padding:7px 8px;color:${bf>25?"#c03030":bf>20?"#c8960a":"#2a7a3a"};font-weight:700">${bf?bf+"%":"—"}</td>
        <td style="text-align:right;padding:7px 8px;color:#c03030">${fat?kgToW(fat)+""+wLbl():"—"}</td>
        <td style="text-align:right;padding:7px 8px;color:#2a7a3a;font-weight:700">${lean?kgToW(lean)+""+wLbl():"—"}</td>
      </tr>`;
    }).join("")}
  </table>
</div>`:""}

<!-- NOTES FOR CLAUDE -->
<div class="section">
  <div class="section-title">&#x270F; Notes for Claude (fill in before uploading)</div>
  <div class="notes-box">
    <div class="notes-prompt">
      How are you feeling this week? Energy levels, sleep, hunger, any niggles or injuries?<br/><br/>
      Are you hitting your macro targets consistently? Any days you blew it?<br/><br/>
      How did the workouts feel? Strength going up, same, or struggling?<br/><br/>
      Anything you want to flag or ask about?
    </div>
  </div>
</div>

<div class="footer">
  <span>Iron Home &bull; oliverminskip.github.io/iron-home</span>
  <span>Generated ${new Date().toISOString().slice(0,10)}</span>
</div>
</body>
</html>`;

  // Open in new tab
  const win=window.open("","_blank");
  if(win){
    win.document.write(reportHtml);
    win.document.close();
  }else{
    showToast("Allow pop-ups to open the report");
  }
};
</script>
</body>
</html>
