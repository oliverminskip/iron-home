<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Iron Home"/>
<meta name="theme-color" content="#f5f4f0"/>
<title>Iron Home</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"Courier New",Courier,monospace;background:#f5f4f0;color:#1a1814;min-height:100vh;-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{cursor:pointer;font-family:inherit}
/* LOADING */
#loading{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e0d8c8;border-top-color:#c8960a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:#9a9690;letter-spacing:3px;text-transform:uppercase}
/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:#f5f4f0;align-items:center;justify-content:center;z-index:100;padding:24px}
.login-box{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1.5px solid #e8e4dc}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:28px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:6px}
.login-sub{font-size:13px;color:#9a9690;margin-bottom:32px;line-height:1.6}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;border:2px solid #ddd9d0;border-radius:12px;font-size:15px;font-weight:700;color:#1a1814;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.btn-google:hover{border-color:#c8960a}
.google-icon{width:20px;height:20px;flex-shrink:0}
.login-footer{font-size:11px;color:#bbb;margin-top:20px;line-height:1.6}
/* APP SHELL */
#app{display:none;min-height:100vh}
.app-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr}
@media(min-width:860px){
  .app-inner{grid-template-columns:260px 1fr;min-height:100vh}
  .sidebar{border-right:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main-col{max-width:720px}
  .mobile-header,.mobile-tabs{display:none!important}
}
@media(max-width:859px){.sidebar{display:none}}
/* SIDEBAR */
.sidebar{padding:28px 20px}
.sb-logo{font-size:9px;letter-spacing:4px;color:#9a9690;margin-bottom:4px;text-transform:uppercase}
.sb-title{font-size:24px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:4px}
.sb-sub{font-size:11px;color:#9a9690;margin-bottom:24px}
.sb-nav{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.sb-nav-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9a9690;text-align:left;transition:all .12s}
.sb-nav-btn:hover{background:#f5f4f0;color:#1a1814}
.sb-nav-btn.active{background:#fef9e8;color:#c8960a}
.sb-divider{border:none;border-top:1px solid #e8e4dc;margin:16px 0}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.sb-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc}
.sb-avatar-init{width:32px;height:32px;border-radius:50%;background:#c8960a;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sb-user-name{font-size:13px;font-weight:600;color:#1a1814;flex:1}
.btn-signout{font-size:11px;color:#9a9690;background:none;border:1px solid #e8e4dc;border-radius:6px;padding:4px 10px;text-transform:uppercase;letter-spacing:1px}
.sb-stat-pill{padding:12px 14px;margin-top:8px;background:#fef9e8;border-radius:8px;border:1px solid #e8c870}
.sb-stat-num{font-size:22px;font-weight:700}
.sb-stat-lbl{font-size:10px;color:#9a9690;letter-spacing:1px;text-transform:uppercase}
/* MOBILE HEADER */
.mobile-header{padding:14px 16px 10px;border-bottom:1.5px solid #ddd9d0;background:#fff;position:sticky;top:0;z-index:50}
.mob-top{display:flex;justify-content:space-between;align-items:center}
.mob-eyebrow{font-size:9px;letter-spacing:4px;color:#9a9690;text-transform:uppercase}
.mob-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.mob-right{display:flex;align-items:center;gap:10px}
.mob-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #e8e4dc;cursor:pointer}
.mob-avatar-init{width:30px;height:30px;border-radius:50%;background:#c8960a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* MOBILE TABS */
.mobile-tabs{display:flex;background:#fff;border-bottom:1.5px solid #ddd9d0;overflow-x:auto}
.tab-btn{flex:0 0 auto;padding:11px 14px;background:none;border:none;border-bottom:3px solid transparent;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:#9a9690;white-space:nowrap}
.tab-btn.active{border-bottom-color:var(--accent,#c8960a);color:var(--accent,#c8960a)}
/* MAIN COLUMN */
.main-col{padding-bottom:80px}
@media(min-width:860px){.main-col{padding:28px 28px 60px}}
/* WORKOUT SELECTOR */
.workout-selector{padding:14px 14px 0;background:#fff;border-bottom:1px solid #e8e4dc}
@media(min-width:860px){.workout-selector{padding:0 0 16px;background:transparent;border-bottom:none}}
.workout-tabs{display:flex;gap:8px}
.wk-btn{flex:1;padding:12px 6px;border-radius:10px;border:1.5px solid #ddd9d0;background:#f5f4f0;color:#5a5650;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all .12s;position:relative}
.wk-btn.active{color:#fff}
.wk-btn .wk-emoji{font-size:20px;margin-bottom:3px}
.wk-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#2a7a3a}
/* SESSION HEADER */
.session-header{padding:12px 14px 10px;background:#fff;border-bottom:1px solid #e8e4dc}
@media(min-width:860px){.session-header{background:transparent;border-bottom:none;padding:0 0 14px}}
.session-title{font-size:22px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.session-sub{font-size:11px;color:#9a9690;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.session-meta{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;align-items:center}
.session-timer-badge{font-size:12px;color:#2a7a3a;background:#edf7ef;border:1px solid #a0d0a8;border-radius:6px;padding:4px 10px;font-weight:700;letter-spacing:1px}
.prev-badge{display:inline-block;font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:6px;padding:4px 10px;font-weight:600}
.finished-badge{font-size:11px;color:#2a7a3a;font-weight:600}
/* START WORKOUT SCREEN */
.start-screen{padding:24px 14px}
@media(min-width:860px){.start-screen{padding:0}}
.start-card{background:#fff;border:1.5px solid #ddd9d0;border-radius:16px;padding:28px 24px;text-align:center;max-width:400px;margin:0 auto}
.start-card-emoji{font-size:48px;margin-bottom:12px}
.start-card-title{font-size:20px;font-weight:700;font-family:Georgia,serif;font-style:italic;margin-bottom:6px}
.start-card-sub{font-size:13px;color:#9a9690;margin-bottom:8px;line-height:1.6}
.start-card-prev{font-size:12px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:6px;padding:6px 12px;margin-bottom:20px;display:inline-block}
.btn-start-workout{width:100%;padding:16px;background:#2a7a3a;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;box-shadow:0 3px 10px rgba(42,122,58,.25)}
.btn-start-workout:hover{background:#236632}
/* WARMUP */
.warmup-box{margin:12px 14px 8px;background:#fff8ec;border:1px solid #e8c870;border-left:4px solid #c8960a;border-radius:10px;padding:11px 14px}
@media(min-width:860px){.warmup-box{margin:0 0 12px}}
.warmup-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:7px;font-weight:700}
.warmup-item{font-size:13px;color:#5a5650;margin-bottom:4px}
.warmup-arrow{color:#c8960a;margin-right:6px}
/* RPT NOTE */
.rpt-note{margin:0 14px 10px;background:#fef9e8;border:1px solid #e0c040;border-radius:10px;padding:9px 14px}
@media(min-width:860px){.rpt-note{margin:0 0 12px}}
.rpt-note-title{font-size:11px;color:#8a6a00;font-weight:700;margin-bottom:2px}
.rpt-note-body{font-size:12px;color:#5a5650;line-height:1.6}
/* EXERCISE CARDS */
.ex-list{padding:0 14px}
@media(min-width:860px){.ex-list{padding:0}}
.ex-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid #ddd9d0;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ex-card.open{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ex-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.ex-name{font-size:16px;font-weight:700;font-family:Georgia,serif;margin-bottom:5px}
.ex-status-done{font-size:12px;color:#2a7a3a;font-weight:600;margin-left:8px}
.ex-status-prog{font-size:12px;color:#a06000;font-weight:600;margin-left:8px}
.ex-toggle{font-size:22px;color:#9a9690;line-height:1}
.ex-body{padding:0 16px 16px}
.tag{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;font-weight:600}
/* WARMUP TABLE */
.wu-table{background:#fff8ec;border:1px solid #e8c870;border-radius:8px;padding:10px 12px;margin-bottom:14px}
.wu-table-title{font-size:10px;letter-spacing:1.5px;color:#a07020;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.wu-row{display:grid;grid-template-columns:52px 60px 60px 1fr;gap:6px;padding:5px 0}
.wu-row+.wu-row{border-top:1px solid #f0e0b0}
.wu-label{font-size:12px;color:#a07020;font-weight:700}
.wu-pct,.wu-reps{font-size:12px;color:#5a5650}
.wu-rest{font-size:11px;color:#9a9690}
/* SET ROWS */
.ws-col-headers{display:grid;grid-template-columns:56px 1fr 72px 72px 90px;gap:6px;padding:4px 0 2px}
.ws-col-h{font-size:9px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600}
.set-row{border-bottom:1px solid #e8e4dc;padding:10px 0}
.set-row.has-entry{background:#f0faf2;margin:0 -16px;padding:10px 16px}
.set-row-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.set-label{font-size:13px;font-weight:700;min-width:56px}
.set-target{font-size:13px;color:#5a5650}
.set-target strong{color:#1a1814}
.set-rest-lbl{font-size:11px;color:#9a9690;margin-left:auto}
.set-inputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.set-input{width:72px;background:#f8f6f2;border:1.5px solid #d0ccc4;border-radius:7px;color:#1a1814;font-size:15px;padding:7px 10px;font-family:inherit;outline:none;font-weight:600}
.set-input.filled{border-color:#2a7a3a}
.prev-tag{font-size:11px;color:#1a5fa8;background:#eaf2fb;border:1px solid #b0d4f0;border-radius:4px;padding:2px 8px;white-space:nowrap;font-weight:600}
/* REST TIMER BUTTON */
.btn-rest{padding:5px 12px;background:#f5f4f0;border:1.5px solid #ddd9d0;border-radius:7px;font-size:11px;font-weight:700;color:#5a5650;letter-spacing:.5px;white-space:nowrap;transition:all .15s}
.btn-rest.running{background:#edf7ef;border-color:#2a7a3a;color:#2a7a3a}
.btn-rest.done{background:#fff8ec;border-color:#c8960a;color:#c8960a;animation:pulse .6s ease 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
/* DROP SET / CUE */
.drop-set{margin-top:10px;font-size:12px;color:#b03030;background:#fff0f0;border:1px solid #f0b0b0;border-radius:7px;padding:9px 12px;font-weight:600}
.cue{margin-top:12px;font-size:12px;color:#5a5650;line-height:1.8;font-style:italic;border-left:3px solid;padding-left:12px;padding-top:2px}
/* BOTTOM BUTTONS */
.bottom-btns{padding:16px 14px 0;display:flex;flex-direction:column;gap:10px}
@media(min-width:860px){.bottom-btns{padding:16px 0 0}}
.btn-finish{width:100%;padding:16px;background:#2a7a3a;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px;box-shadow:0 3px 10px rgba(42,122,58,.25)}
.btn-finish:hover{background:#236632}
.btn-finished-state{width:100%;padding:14px;background:#edf7ef;border:1.5px solid #2a7a3a;border-radius:12px;color:#2a7a3a;font-size:15px;font-weight:700;text-align:center}
.btn-clear{width:100%;padding:12px;background:none;border:1.5px solid #f0b0b0;border-radius:10px;color:#c03030;font-size:13px;font-weight:600}
.btn-confirm{flex:1;padding:12px;background:#c03030;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700}
.btn-cancel{flex:1;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
.confirm-row{display:flex;gap:8px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.modal-box{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-icon{font-size:32px;text-align:center;margin-bottom:8px}
.modal-title{font-size:20px;font-weight:700;font-family:Georgia,serif;text-align:center;margin-bottom:6px}
.modal-body{font-size:14px;color:#5a5650;text-align:center;margin-bottom:24px;line-height:1.6}
.btn-modal-ok{width:100%;padding:14px;background:#2a7a3a;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;margin-bottom:10px}
.btn-modal-cancel{width:100%;padding:12px;background:none;border:1.5px solid #ddd9d0;border-radius:10px;color:#5a5650;font-size:14px}
/* HISTORY */
.history-wrap{padding:14px}
@media(min-width:860px){.history-wrap{padding:0}}
.section-title{font-size:11px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.history-empty{padding:40px 20px;text-align:center;color:#9a9690;font-size:15px;line-height:1.8}
.hist-card{background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.hist-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none}
.hist-day-name{font-size:16px;font-weight:700;font-family:Georgia,serif;font-style:italic}
.hist-meta{font-size:11px;color:#9a9690;margin-top:2px}
.hist-body{padding:0 16px 16px}
.hist-ex-name{font-size:13px;font-weight:700;margin-bottom:4px;margin-top:10px}
.hist-set-row{display:flex;gap:12px;font-size:13px;color:#5a5650;margin-bottom:3px;padding-left:12px}
.hist-set-lbl{color:#9a9690;width:44px;flex-shrink:0}
.hist-kg{color:#a07000;font-weight:700}
.hist-reps{color:#1a1814;font-weight:700}
.hist-vol{font-size:11px;color:#9a9690;margin-top:6px;font-style:italic}
.btn-delete{margin-top:12px;background:none;border:1px solid #f0b0b0;border-radius:6px;color:#c03030;font-size:12px;padding:9px 16px;font-weight:600}
.btn-delete-yes{flex:1;padding:11px;background:#c03030;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700}
.btn-delete-no{flex:1;padding:11px;background:none;border:1.5px solid #ddd9d0;border-radius:8px;color:#5a5650;font-size:13px}
/* SCHEDULE */
.schedule-wrap{padding:14px}
@media(min-width:860px){.schedule-wrap{padding:0}}
.sched-row{display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:8px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.info-box{margin-top:10px;background:#fff;border:1.5px solid #ddd9d0;border-left:4px solid;border-radius:10px;padding:14px 16px}
.info-box-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:700}
.info-box-body{font-size:13px;color:#5a5650;line-height:1.8}
/* ═══ STATS TAB ═══ */
.stats-wrap{padding:14px}
@media(min-width:860px){.stats-wrap{padding:0}}
/* Unit toggle */
.unit-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.unit-group{display:flex;gap:0;border:1.5px solid #ddd9d0;border-radius:8px;overflow:hidden}
.unit-btn{padding:7px 14px;border:none;background:#f5f4f0;font-size:12px;font-weight:700;color:#5a5650;letter-spacing:.5px;border-right:1px solid #ddd9d0}
.unit-btn:last-child{border-right:none}
.unit-btn.active{background:#c8960a;color:#fff}
.unit-sep{font-size:11px;color:#9a9690;padding:0 4px;align-self:center}
/* Stats card */
.stats-card{background:#fff;border:1.5px solid #ddd9d0;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stats-card-title{font-size:10px;letter-spacing:2px;color:#9a9690;text-transform:uppercase;font-weight:700;margin-bottom:14px}
.stats-input-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
.stats-field{display:flex;flex-direction:column;gap:4px}
.stats-label{font-size:11px;color:#9a9690;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.stats-input{width:110px;background:#f8f6f2;border:1.5px solid #d0ccc4;border-radius:7px;color:#1a1814;font-size:15px;padding:8px 10px;font-family:inherit;outline:none;font-weight:600}
.stats-input:focus{border-color:#c8960a}
.btn-log-stats{padding:10px 20px;background:#c8960a;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;align-self:flex-end}
/* Result tiles */
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.result-tile{background:#f8f6f2;border:1.5px solid #e8e4dc;border-radius:10px;padding:12px 14px}
.result-tile.hi{background:#fef9e8;border-color:#e8c870}
.result-tile.go{background:#edf7ef;border-color:#a0d0a8}
.result-tile.wa{background:#fff3ea;border-color:#f0c090}
.result-tile.ba{background:#fff0f0;border-color:#f0b0b0}
.result-lbl{font-size:10px;letter-spacing:1.5px;color:#9a9690;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.result-val{font-size:22px;font-weight:700;color:#1a1814;font-family:Georgia,serif}
.result-sub{font-size:11px;color:#9a9690;margin-top:2px}
/* Kinobody ratio bar */
.kino-bar-wrap{margin-top:4px}
.kino-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#9a9690;margin-bottom:6px}
.kino-bar-track{height:12px;background:#e8e4dc;border-radius:6px;overflow:visible;position:relative}
.kino-bar-fill{height:100%;border-radius:6px;transition:width .5s}
.kino-marker{position:absolute;top:-4px;width:3px;height:20px;background:#2a7a3a;border-radius:2px}
.kino-status{margin-top:8px;font-size:13px;font-weight:600;line-height:1.6}
/* Phase toggle */
.phase-toggle{display:flex;gap:0;border:1.5px solid #ddd9d0;border-radius:10px;overflow:hidden;margin-bottom:14px}
.phase-btn{flex:1;padding:10px 6px;border:none;background:#f5f4f0;font-size:12px;font-weight:700;color:#5a5650;border-right:1px solid #ddd9d0;transition:all .12s}
.phase-btn:last-child{border-right:none}
.phase-btn.cut.active{background:#1a7fa8;color:#fff}
.phase-btn.recomp.active{background:#c8960a;color:#fff}
.phase-btn.bulk.active{background:#2a7a3a;color:#fff}
/* Macro panel */

/* ═══ SESSION CLOCK ═══ */
function startSessionClock(){
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionClockInterval=setInterval(()=>{
    if(S.sessionStartTs){
      S.sessionElapsedMs=Date.now()-S.sessionStartTs;
      const badge=document.getElementById("session-clock");
      if(badge)badge.textContent="&#x23F1; "+fmtDuration(S.sessionElapsedMs);
    }
  },1000);
}
function fmtDuration(ms){const t=Math.floor(ms/1000);const m=Math.floor(t/60),s=t%60;return `${m}:${s.toString().padStart(2,"0")}`;}
function fmtSecs(s){const m=Math.floor(s/60),r=s%60;return `${m}:${r.toString().padStart(2,"0")}`;}

/* ═══ REST TIMER ═══ */
function startRestTimer(exId,setIdx,targetSecs){
  const key=`${exId}_${setIdx}`;
  if(S.activeTimers[key]&&S.activeTimers[key].status==="running"){
    // cancel if already running
    clearInterval(S.activeTimers[key].interval);
    delete S.activeTimers[key];
    refreshTimerBtn(exId,setIdx);
    return;
  }
  // cancel any other running timer for this exercise
  Object.keys(S.activeTimers).forEach(k=>{
    if(k.startsWith(exId+"_")&&S.activeTimers[k].status==="running"){
      clearInterval(S.activeTimers[k].interval);
      delete S.activeTimers[k];
    }
  });
  let secs=targetSecs;
  S.activeTimers[key]={secs,targetSecs,status:"running",interval:null};
  S.activeTimers[key].interval=setInterval(()=>{
    secs--;
    S.activeTimers[key].secs=secs;
    refreshTimerBtn(exId,setIdx);
    if(secs<=0){
      clearInterval(S.activeTimers[key].interval);
      S.activeTimers[key].status="done";
      playChime();
      refreshTimerBtn(exId,setIdx);
    }
  },1000);
  refreshTimerBtn(exId,setIdx);
}
function refreshTimerBtn(exId,setIdx){
  const key=`${exId}_${setIdx}`;
  const btn=document.getElementById(`rtbtn_${exId}_${setIdx}`);
  if(!btn)return;
  const t=S.activeTimers[key];
  if(!t){btn.textContent="Rest";btn.className="btn-rest";return;}
  if(t.status==="running"){
    btn.textContent=fmtSecs(Math.max(0,t.secs));
    btn.className="btn-rest running";
  }else{
    btn.textContent="Done &#x2713;";
    btn.className="btn-rest done";
    setTimeout(()=>{delete S.activeTimers[key];if(btn)btn.textContent="Rest",btn.className="btn-rest";},4000);
  }
}
function playChime(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1047,0.3]].forEach(([freq,delay])=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;osc.type="sine";
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+delay+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+0.65);
    });
  }catch(e){}
}

function kgToW(kg){if(!kg&&kg!==0)return"";if(S.units.weight==="lbs")return(kg*2.20462).toFixed(1);return kg.toFixed(1);}
function wToKg(v){if(S.units.weight==="lbs")return v/2.20462;return parseFloat(v);}
function cmToM(cm){if(!cm&&cm!==0)return"";if(S.units.measure==="in")return(cm/2.54).toFixed(1);return cm.toFixed(1);}
function mToCm(v){if(S.units.measure==="in")return v*2.54;return parseFloat(v);}
function wLbl(){return S.units.weight==="lbs"?"lbs":"kg";}
function mLbl(){return S.units.measure==="in"?"in":"cm";}

/* ═══ SCIENCE CALCS ═══ */
function navyBF(waistCm,neckCm,heightCm){
  if(!waistCm||!neckCm||!heightCm||waistCm<=neckCm)return null;
  // Using cm directly with the cm-adjusted formula
  const waistIn=waistCm*0.393701,neckIn=neckCm*0.393701,htIn=heightCm*0.393701;
  const bf=86.010*Math.log10(waistIn-neckIn)-70.041*Math.log10(htIn)+36.76;
  return Math.max(3,Math.min(50,parseFloat(bf.toFixed(1))));
}
function kinoIdeal(heightCm){return heightCm*0.447;}
function calcMacros(weightKg,bf,phase){
  if(!weightKg||!bf)return null;
  const lbmKg=weightKg*(1-bf/100);
  const bmr=370+(21.6*lbmKg);
  const maint=bmr*1.375;
  let cal;
  if(phase==="cut")cal=maint*0.85;
  else if(phase==="bulk")cal=maint+300;
  else cal=maint;
  cal=Math.round(cal);
  const protein=Math.round(weightKg*2.2);
  const fat=Math.round((cal*0.20)/9);
  const proteinCal=protein*4,fatCal=fat*9;
  const carbs=Math.max(0,Math.round((cal-proteinCal-fatCal)/4));
  return{cal,protein,fat,carbs,lbmKg:parseFloat(lbmKg.toFixed(1)),maint:Math.round(maint)};
}
function calcVolume(sessionData,workoutExercises){
  let vol=0;
  workoutExercises.forEach(ex=>{
    const ed=sessionData[ex.id];
    if(!ed)return;
    ex.workingSets.forEach((_,i)=>{
      const s=ed[i];
      if(!s||!s.reps)return;
      const r=parseFloat(s.reps)||0;
      const kg=s.kg?parseFloat(s.kg)||0:0;
      // For bodyweight exercises with no weight, count reps only (plot separately)
      if(ex.isWeightedBW&&kg===0){vol+=r*1;}// treat as 1kg token
      else{vol+=r*kg;}
    });
  });
  return Math.round(vol);
}

/* ═══ SESSION KEY ═══ */
function getActiveSessionKey(){
  // Use the start date captured when workout began, not today
  if(S.sessionStartDate)return`${S.activeWkId}_${S.sessionStartDate}`;
  // Fallback for sessions already in log
  return`${S.activeWkId}_${new Date().toISOString().slice(0,10)}`;
}

function tagEl(type){const s=TS[type]||TS.Straight;return`<span class="tag" style="background:${s.bg};border-color:${s.border};color:${s.text}">${type}</span>`;}
function prevBadge(kgRaw,reps){if(!kgRaw&&!reps)return"";const p=[];if(kgRaw)p.push(kgRaw+"kg");if(reps)p.push(reps+" reps");return`<span class="prev-tag">${p.join(" &middot; ")} &uarr;prev</span>`;}
function wuTbl(sets){if(!sets.length)return"";return`<div class="wu-table"><div class="wu-table-title">Warm-Up Sets &mdash; not logged</div>${sets.map(s=>`<div class="wu-row"><span class="wu-label">${s.label}</span><span class="wu-pct">${s.pct}</span><span class="wu-reps">${s.reps} reps</span><span class="wu-rest">${s.rest}</span></div>`).join("")}</div>`;}

function sRow(ws,i,ex,pd,td){
  const ck=td?.[i]?.kg||"",cr=td?.[i]?.reps||"",has=ck||cr;
  const tSecs=ex.restSecs?.[i]||60;
  const timerKey=`${ex.id}_${i}`;
  const t=S.activeTimers[timerKey];
  let btnTxt="Rest",btnCls="btn-rest";
  if(t){if(t.status==="running"){btnTxt=fmtSecs(Math.max(0,t.secs));btnCls="btn-rest running";}else{btnTxt="Done &#x2713;";btnCls="btn-rest done";}}
  return`<div class="set-row${has?" has-entry":""}">
    <div class="set-row-top">
      <span class="set-label">${ws.label}</span>
      <span class="set-target">Target: <strong>${ws.repRange}</strong></span>
      <span class="set-rest-lbl">rest: ${ws.rest}</span>
    </div>
    <div class="set-inputs">
      <input class="set-input${ck?" filled":""}" type="number" inputmode="decimal" placeholder="kg" value="${ck}" oninput="updSet('${ex.id}',${i},'kg',this.value)"/>
      <input class="set-input${cr?" filled":""}" type="number" inputmode="numeric" placeholder="reps" value="${cr}" oninput="updSet('${ex.id}',${i},'reps',this.value)"/>
      ${prevBadge(pd?.[i]?.kg,pd?.[i]?.reps)}
      <button id="rtbtn_${ex.id}_${i}" class="${btnCls}" onclick="startRest('${ex.id}',${i},${tSecs})">${btnTxt}</button>
    </div>
  </div>`;
}

function exCard(ex,ts,ps){
  const t=TS[ex.type]||TS.Straight,isO=S.openEx[ex.id],td=ts?.[ex.id],pd=ps?.[ex.id];
  const logged=ex.workingSets.filter((_,i)=>td?.[i]?.kg||td?.[i]?.reps).length;
  const allD=logged===ex.workingSets.length&&logged>0;
  const stat=allD?`<span class="ex-status-done">&#x2713; done</span>`:logged>0?`<span class="ex-status-prog">${logged}/${ex.workingSets.length} sets</span>`:"";
  let body="";
  if(isO){
    const ch=`<div class="ws-col-headers"><div class="ws-col-h"></div><div class="ws-col-h">Target</div><div class="ws-col-h">KG</div><div class="ws-col-h">Reps</div><div class="ws-col-h">Rest</div></div>`;
    body=`<div class="ex-body">${wuTbl(ex.warmupSets)}${ch}${ex.workingSets.map((ws,i)=>sRow(ws,i,ex,pd,td)).join("")}${ex.dropSet?`<div class="drop-set">DROP SET: ${ex.dropSet}</div>`:""}<div class="cue" style="border-color:${t.border}">${ex.cue}</div></div>`;
  }
  return`<div class="ex-card${isO?" open":""}" style="border-left-color:${isO?t.border:"#ddd9d0"}"><div class="ex-header" onclick="togEx('${ex.id}')"><div style="flex:1;padding-right:10px"><div class="ex-name">${ex.name}${stat}</div>${tagEl(ex.type)}</div><div class="ex-toggle">${isO?"&minus;":"+"}</div></div>${body}</div>`;
}

/* ═══ RENDER WORKOUT TAB ═══ */
function rWorkout(){
  const wk=WORKOUTS.find(w=>w.id===S.activeWkId);
  const sk=getActiveSessionKey();
  const ts=S.log[sk]||{},fin=!!ts.finished;
  const isActive=!!S.sessionStartDate;

  // Previous session for this workout type
  const prevKey=Object.keys(S.log).filter(k=>k.startsWith(S.activeWkId+"_")&&k!==sk&&S.log[k]?.finished).sort().reverse()[0]||null;
  const ps=prevKey?S.log[prevKey]:{};

  const n=wk.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;

  // Workout selector
  const sel=`<div class="workout-selector"><div class="workout-tabs">${WORKOUTS.map(w=>{
    const a=w.id===S.activeWkId,h=Object.keys(S.log).some(k=>k.startsWith(w.id+"_")&&S.log[k]?.finished);
    return`<button class="wk-btn${a?" active":""}" style="${a?`background:${w.accent};border-color:${w.accent}`:""}" onclick="setWk('${w.id}')"><div class="wk-emoji">${w.emoji}</div><div>${w.label}</div>${h&&!a?`<div class="wk-dot"></div>`:""}</button>`;
  }).join("")}</div></div>`;

  if(!isActive&&!fin){
    // Show "Start Workout" screen
    const prevDateStr=prevKey?prevKey.split("_")[1]:null;
    const prevVol=prevKey?calcVolume(S.log[prevKey]||{},wk.exercises):0;
    return sel+`<div class="start-screen"><div class="start-card">
      <div class="start-card-emoji">${wk.emoji}</div>
      <div class="start-card-title">${wk.name}</div>
      <div class="start-card-sub">${wk.subtitle}</div>
      ${prevDateStr?`<div class="start-card-prev">&#x1F4CB; Last: ${prevDateStr} &mdash; ${prevVol}kg volume</div>`:""}
      <button class="btn-start-workout" onclick="startWorkout()">&#x25B6; Start ${wk.name}</button>
    </div></div>`;
  }

  // Session in progress or finished
  const vol=calcVolume(ts,wk.exercises);
  const sessionHeader=`<div class="session-header">
    <div class="session-title" style="color:${wk.accent}">${wk.name} &mdash; ${wk.label}</div>
    <div class="session-sub">${wk.subtitle}</div>
    <div class="session-meta">
      ${isActive&&!fin?`<span class="session-timer-badge" id="session-clock">&#x23F1; 0:00</span>`:""}
      ${fin?`<span class="finished-badge">&#x2713; Finished &mdash; ${vol}kg volume</span>`:`<span style="font-size:11px;color:#9a9690">${vol>0?vol+"kg logged":""}</span>`}
      ${prevKey?`<span class="prev-badge">&#x1F4CB; Prev: ${prevKey.split("_")[1]}</span>`:""}
    </div>
  </div>`;

  const warmup=`<div class="warmup-box"><div class="warmup-title">General Warm-Up &mdash; 5&ndash;8 min</div>${wk.warmup.map(w=>`<div class="warmup-item"><span class="warmup-arrow">&rarr;</span>${w}</div>`).join("")}</div>`;
  const rptNote=`<div class="rpt-note"><div class="rpt-note-title">RPT &mdash; Heaviest set first</div><div class="rpt-note-body">Hit top of rep range on ALL sets &rarr; add weight next session. Always log in <strong>kg</strong>.</div></div>`;
  const cards=`<div class="ex-list">${wk.exercises.map(ex=>exCard(ex,ts,ps)).join("")}</div>`;

  let bb="";
  if(!fin&&n>0)bb+=`<button class="btn-finish" onclick="openFin()">&#x1F3C1; Finish ${wk.name}</button>`;
  if(fin)bb+=`<div class="btn-finished-state">&#x2713; ${wk.name} complete &mdash; ${vol}kg total volume</div>`;
  if(n>0)bb+=S.confirmClear?`<div class="confirm-row"><button class="btn-confirm" onclick="clearSession()">Yes, clear</button><button class="btn-cancel" onclick="setCC(false)">Cancel</button></div>`:`<button class="btn-clear" onclick="setCC(true)">Clear session log</button>`;

  return sel+sessionHeader+warmup+rptNote+cards+`<div class="bottom-btns">${bb}</div>`;
}

/* ═══ RENDER HISTORY ═══ */
function rHistory(){
  const entries=Object.entries(S.log).filter(([,d])=>d.finished).map(([key,dd])=>{
    const parts=key.split("_");const wkId=parts[0],date=parts[1];
    const wk=WORKOUTS.find(w=>w.id===wkId);return wk?{key,date,wk,dd}:null;
  }).filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date));
  if(!entries.length)return`<div class="history-wrap"><div class="section-title">Workout History</div><div class="history-empty">No finished workouts yet.</div></div>`;
  const cards=entries.map(({key,wk,date,dd})=>{
    const isO=S.openEx["h_"+key];
    const vol=calcVolume(dd,wk.exercises);
    let body="";
    if(isO){
      const rows=wk.exercises.map(ex=>{const ed=dd[ex.id];if(!ed)return"";const hd=Object.values(ed).some(s=>s&&(s.kg||s.reps));if(!hd)return"";return`<div class="hist-ex-name">${ex.name}</div>`+ex.workingSets.map((ws,i)=>{const s=ed[i];if(!s||(!s.kg&&!s.reps))return"";return`<div class="hist-set-row"><span class="hist-set-lbl">${ws.label}</span>${s.kg?`<span class="hist-kg">${s.kg}kg</span>`:""}${s.reps?`<span class="hist-reps">${s.reps} reps</span>`:""}</div>`;}).join("");}).join("");
      const del=S.confirmDeleteKey===key?`<div class="confirm-row" style="margin-top:12px"><button class="btn-delete-yes" onclick="delSess('${key}')">Yes, delete</button><button class="btn-delete-no" onclick="setDC(null)">Cancel</button></div>`:`<button class="btn-delete" onclick="setDC('${key}')">Delete session</button>`;
      body=`<div class="hist-body">${rows}<div class="hist-vol">Total volume: ${vol}kg</div>${del}</div>`;
    }
    return`<div class="hist-card" style="border-left-color:${wk.accent}"><div class="hist-header" onclick="togEx('h_${key}')"><div><div class="hist-day-name">${wk.emoji} ${wk.name}</div><div class="hist-meta">${date} &mdash; ${vol}kg volume</div></div><div style="font-size:20px;color:#9a9690">${isO?"&minus;":"+"}</div></div>${body}</div>`;
  }).join("");
  return`<div class="history-wrap"><div class="section-title">Workout History</div>${cards}</div>`;
}

        <div class="macro-tile"><div class="macro-lbl">Calories</div><div class="macro-val">${m.cal}</div><div class="macro-sub">kcal/day</div></div>
        <div class="macro-tile"><div class="macro-lbl">Protein</div><div class="macro-val">${m.protein}g</div><div class="macro-sub">2.2g &times; kg BW</div></div>
        <div class="macro-tile"><div class="macro-lbl">Carbs</div><div class="macro-val">${m.carbs}g</div><div class="macro-sub">remaining cals</div></div>
        <div class="macro-tile"><div class="macro-lbl">Fats</div><div class="macro-val">${m.fat}g</div><div class="macro-sub">20% of cals</div></div>
      </div>
      <div style="font-size:11px;color:#9a9690;margin-top:10px;line-height:1.6">Maintenance: ${m.maint} kcal &bull; LBM: ${kgToW(m.lbmKg)}${wLbl()} &bull; Based on Katch-McArdle &times; 1.375</div>`;
    })()}
  </div>`;

  /* CHARTS */
  let chartsHtml="";
  if(stats.length>1&&hCm&&nCm){
    const pts=stats.slice(-12);
    const W=320,H=110,px=10,py=8;
    function svgLine(vals,mn,mx,color,dash){
      if(!vals.some(v=>v!==null))return"";
      const pts2=vals.map((v,i)=>{if(v===null)return null;const x=px+i/(vals.length-1||1)*(W-px*2);const y=H-py-((v-mn)/(mx-mn||1))*(H-py*2);return`${x.toFixed(1)},${y.toFixed(1)}`;}).filter(Boolean).join(" ");
      return`<polyline points="${pts2}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"${dash?` stroke-dasharray="${dash}"`:""}/>`+vals.map((v,i)=>{if(v===null)return"";const x=px+i/(vals.length-1||1)*(W-px*2);const y=H-py-((v-mn)/(mx-mn||1))*(H-py*2);return`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}"/>`;}).join("");
    }

    // Graph 1: Recomp - lean mass vs fat mass vs waist
    const leans=pts.map(s=>{const bf=navyBF(s.waistCm,nCm,hCm);return bf?parseFloat((s.weightKg*(1-bf/100)).toFixed(1)):null;});
    const fats=pts.map(s=>{const bf=navyBF(s.waistCm,nCm,hCm);return bf?parseFloat((s.weightKg*bf/100).toFixed(1)):null;});
    const waists=pts.map(s=>parseFloat(cmToM(s.waistCm)));
    const allR=[...leans,...fats].filter(Boolean);
    if(allR.length>0){
      const mn=Math.min(...allR)-2,mx=Math.max(...allR)+2;
      chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F4C8; Recomposition Trend</div><div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="100%">${svgLine(leans,mn,mx,"#2a7a3a","")}${svgLine(fats,mn,mx,"#c03030","4,3")}</svg></div><div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:#2a7a3a"></div>Lean Mass (${wLbl()})</div><div class="legend-item"><div class="legend-dot" style="background:#c03030"></div>Fat Mass (${wLbl()})</div></div></div>`;
    }

    // Graph 2: Strength vs Bodyweight
    // Gather anchor lift top set from log
    const anchorEx=S.strengthAnchor; // "A1" or "B1"
    const wkId=anchorEx[0];
    const anchorWk=WORKOUTS.find(w=>w.id===wkId);
    const anchorExObj=anchorWk?.exercises.find(e=>e.id===anchorEx);
    const strengthPts=[];
    const bodyweightPts=[];
    Object.entries(S.log).filter(([k,d])=>d.finished&&k.startsWith(wkId+"_")).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12).forEach(([key,d])=>{
      const ed=d[anchorEx];
      if(ed&&ed[0]){
        const w=ed[0].kg?parseFloat(ed[0].kg):null;
        const r=ed[0].reps?parseFloat(ed[0].reps):null;
        // Estimate 1RM: w*reps*0.0333+w
        const e1rm=w&&r?parseFloat((w+w*r*0.0333).toFixed(1)):r; // reps only for BW moves
        strengthPts.push(e1rm||null);
      }else{strengthPts.push(null);}
    });
    // Match bodyweight pts to same dates
    const liftDates=Object.keys(S.log).filter(k=>S.log[k].finished&&k.startsWith(wkId+"_")).sort().slice(-12).map(k=>k.split("_")[1]);
    liftDates.forEach(d=>{
      const sv=stats.find(s=>s.date===d);
      bodyweightPts.push(sv?parseFloat(kgToW(sv.weightKg)):null);
    });
    if(strengthPts.filter(Boolean).length>0){
      const allS=[...strengthPts,...bodyweightPts].filter(Boolean);
      const mn2=Math.min(...allS)-2,mx2=Math.max(...allS)+2;
      const anchorName=anchorExObj?anchorExObj.name:"Anchor Lift";
      chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F4AA; Strength vs Bodyweight</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          ${["A1","B1"].map(id=>{const w=WORKOUTS.find(w=>w.id===id[0]);const e=w?.exercises.find(ex=>ex.id===id);return e?`<button style="padding:5px 10px;font-size:10px;font-weight:700;border:1.5px solid ${S.strengthAnchor===id?"#c8960a":"#ddd9d0"};border-radius:6px;background:${S.strengthAnchor===id?"#fef9e8":"#f5f4f0"};color:${S.strengthAnchor===id?"#8a6a00":"#5a5650"}" onclick="setAnchor('${id}')">${e.name.slice(0,18)}&hellip;</button>`:"";}).join("")}
        </div>
        <div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="100%">${svgLine(strengthPts,mn2,mx2,"#c8960a","")}${svgLine(bodyweightPts,mn2,mx2,"#9a9690","4,3")}</svg></div>
        <div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:#c8960a"></div>Est. 1RM / Reps (${wLbl()})</div><div class="legend-item"><div class="legend-dot" style="background:#9a9690"></div>Bodyweight (${wLbl()})</div></div>
      </div>`;
    }

    // Graph 3: Session Tonnage per workout
    const tonnageByWk={A:[],B:[],C:[]};
    const tonnageDates=[];
    WORKOUTS.forEach(wk=>{
      Object.entries(S.log).filter(([k,d])=>d.finished&&k.startsWith(wk.id+"_")).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8).forEach(([key,d])=>{
        tonnageByWk[wk.id].push(calcVolume(d,wk.exercises));
      });
    });
    const maxT=WORKOUTS.map(w=>Math.max(...(tonnageByWk[w.id].length?tonnageByWk[w.id]:[0]))).reduce((a,b)=>Math.max(a,b),0);
    if(maxT>0){
      const WW=320,HH=110;
      const colors={"A":"#c8960a","B":"#1a7fa8","C":"#b83030"};
      let tonnageSvg=`<svg class="chart-svg" viewBox="0 0 ${WW} ${HH}" width="100%">`;
      WORKOUTS.forEach(wk=>{
        const vals=tonnageByWk[wk.id];
        if(!vals.length)return;
        const mn3=0,mx3=maxT+50;
        tonnageSvg+=svgLine(vals,mn3,mx3,colors[wk.id],"");
      });
      tonnageSvg+=`</svg>`;
      chartsHtml+=`<div class="stats-card"><div class="stats-card-title">&#x1F3CB; Session Tonnage (kg)</div><div class="chart-wrap">${tonnageSvg}</div><div class="chart-legend">${WORKOUTS.map(w=>`<div class="legend-item"><div class="legend-dot" style="background:${colors[w.id]}"></div>${w.name}</div>`).join("")}</div></div>`;
    }
  }

  /* LOG TABLE */
  let logHtml="";
  if(stats.length){
    const rows=[...stats].reverse().slice(0,10).map((s,i)=>{
      const bf=hCm&&nCm?navyBF(s.waistCm,nCm,hCm):null;
      const ri=stats.length-1-i;
      return`<div class="stats-log-row"><span class="stats-log-date">${s.date}</span><div class="stats-log-vals"><span class="stats-log-val">${kgToW(s.weightKg)}${wLbl()}</span><span class="stats-log-val">${cmToM(s.waistCm).toString().slice(0,4)}${mLbl()}</span>${bf?`<span class="stats-log-bf">${bf}% BF</span>`:""}</div><button class="btn-del-stat" onclick="delStat(${ri})">&times;</button></div>`;
    }).join("");
    logHtml=`<div class="stats-card"><div class="stats-card-title">&#x1F4C5; Check-In Log</div>${rows}</div>`;
  }

  return`<div class="stats-wrap">${unitRow}${profileCard}${logCard}${resultsHtml}${phaseHtml}${chartsHtml}${logHtml}</div>`;
}

/* ═══ MODAL ═══ */
function rModal(){
  if(!S.showFinishModal)return"";
  const wk=WORKOUTS.find(w=>w.id===S.activeWkId);
  const sk=getActiveSessionKey();const ts=S.log[sk]||{};
  const n=wk.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;
  const vol=calcVolume(ts,wk.exercises);
  const dur=S.sessionStartTs?fmtDuration(Date.now()-S.sessionStartTs):"";
  return`<div class="modal-overlay" onclick="closeFin()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-icon">&#x1F3C1;</div>
    <div class="modal-title">Finish ${wk.name}?</div>
    <div class="modal-body">${n} set${n!==1?"s":""} logged &bull; ${vol}kg volume${dur?" &bull; "+dur+" session":""}</div>
    <button class="btn-modal-ok" onclick="finSess()">Save to History &#x2713;</button>
    <button class="btn-modal-cancel" onclick="closeFin()">Keep logging</button>
  </div></div>`;
}

/* ═══ MAIN RENDER ═══ */
const TABS=["workout","history","schedule","stats"];
const TICONS={"workout":"&#x1F4AA;","history":"&#x1F4CB;","schedule":"&#x1F4C5;","stats":"&#x1F4CA;"};
const TLBLS={"workout":"Workout","history":"History","schedule":"Schedule","stats":"Stats"};

function render(){
  if(!currentUser)return;
  const wk=WORKOUTS.find(w=>w.id===S.activeWkId);
  const accent=wk.accent;
  const name=currentUser.displayName||"User";
  const init=name.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
  const photo=currentUser.photoURL;
  const mobAv=photo?`<img src="${photo}" class="mob-avatar" onclick="toggleMenu()" onerror="this.style.display='none'">`:`<div class="mob-avatar-init" onclick="toggleMenu()">${init}</div>`;
  const sbAv=photo?`<img src="${photo}" class="sb-avatar" onerror="this.style.display='none'">`:`<div class="sb-avatar-init">${init}</div>`;

  // Session info for sidebar
  const sk=getActiveSessionKey();const ts=S.log[sk]||{};
  const n=wk.exercises.flatMap(ex=>ex.workingSets.map((_,i)=>ts[ex.id]?.[i])).filter(s=>s?.kg||s?.reps).length;

  const tabs=TABS.map(t=>`<button class="tab-btn${S.tab===t?" active":""}" style="--accent:${accent}" onclick="setTab('${t}')">${TICONS[t]} ${TLBLS[t]}</button>`).join("");
  const sbNav=TABS.map(t=>`<button class="sb-nav-btn${S.tab===t?" active":""}" onclick="setTab('${t}')">${TICONS[t]} ${TLBLS[t]}</button>`).join("");

  let content=S.tab==="workout"?rWorkout():S.tab==="history"?rHistory():S.tab==="schedule"?rSchedule():rStats();

  document.getElementById("app").innerHTML=`<div class="app-inner">
    <div class="sidebar">
      <div class="sb-logo">Home Training</div>
      <div class="sb-title">IRON HOME</div>
      <div class="sb-sub">Bowflex 1090s &middot; Pull-Up Bar &middot; Bench</div>
      <div class="sb-nav">${sbNav}</div>
      <hr class="sb-divider"/>
      <div class="sb-user" onclick="toggleMenu()">${sbAv}<div class="sb-user-name">${name}</div><button class="btn-signout" onclick="event.stopPropagation();doSignOut()">Sign out</button></div>
      ${n>0?`<div class="sb-stat-pill"><div class="sb-stat-num" style="color:${accent}">${n}</div><div class="sb-stat-lbl">sets today</div></div>`:""}
      ${S.sessionStartTs&&!ts.finished?`<div class="sb-stat-pill" style="margin-top:6px;background:#edf7ef;border-color:#a0d0a8"><div class="sb-stat-num" style="color:#2a7a3a;font-size:16px" id="sb-clock">${fmtDuration(S.sessionElapsedMs)}</div><div class="sb-stat-lbl">session time</div></div>`:""}
    </div>
    <div class="main-col">
      <div class="mobile-header">
        <div class="mob-top">
          <div><div class="mob-eyebrow">Home Training</div><div class="mob-title">IRON HOME</div></div>
          <div class="mob-right">
            ${n>0?`<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:${accent}">${n}</div><div style="font-size:9px;color:#9a9690;letter-spacing:1px;text-transform:uppercase">sets</div></div>`:""}
            ${mobAv}
          </div>
        </div>
      </div>
      <div class="mobile-tabs">${tabs}</div>
      ${content}
    </div>
  </div>${rModal()}`;

  // Restart session clock display if active
  if(S.sessionStartTs&&!ts.finished){
    startSessionClock();
  }
}
window.render=render;

/* ═══ ACTIONS ═══ */
window.setTab=t=>{S.tab=t;render();};
window.setWk=id=>{
  // switching workout resets session state if different workout
  if(id!==S.activeWkId){
    if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
    S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;S.activeTimers={};
  }
  S.activeWkId=id;S.confirmClear=false;render();
};
window.togEx=id=>{S.openEx[id]=!S.openEx[id];render();};
window.setCC=v=>{S.confirmClear=v;render();};
window.setDC=k=>{S.confirmDeleteKey=k;render();};
window.openFin=()=>{S.showFinishModal=true;render();};
window.closeFin=()=>{S.showFinishModal=false;render();};
window.setUnit=(t,v)=>{S.units[t]=v;render();};
window.setPhase=async ph=>{S.profile.phase=ph;await fbSaveProfile(S.profile);render();};
window.setAnchor=id=>{S.strengthAnchor=id;render();};

window.startWorkout=()=>{
  const now=new Date();
  S.sessionStartDate=now.toISOString().slice(0,10); // Immutable key
  S.sessionStartTs=Date.now();
  S.sessionElapsedMs=0;
  const sk=getActiveSessionKey();
  if(!S.log[sk])S.log[sk]={startedAt:now.toISOString()};
  startSessionClock();
  render();
};

window.startRest=(exId,setIdx,secs)=>{startRestTimer(exId,setIdx,secs);};

window.updSet=async(eid,i,field,val)=>{
  const sk=getActiveSessionKey();
  if(!S.log[sk])S.log[sk]={};
  if(!S.log[sk][eid])S.log[sk][eid]={};
  if(!S.log[sk][eid][i])S.log[sk][eid][i]={};
  S.log[sk][eid][i][field]=val;
  await fbSave(sk,S.log[sk]);
};

window.finSess=async()=>{
  const sk=getActiveSessionKey();
  if(!S.log[sk])S.log[sk]={};
  S.log[sk].finished=true;
  S.log[sk].finishedAt=new Date().toISOString();
  S.log[sk].durationMs=S.sessionStartTs?Date.now()-S.sessionStartTs:0;
  S.showFinishModal=false;
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  // Cancel all timers
  Object.values(S.activeTimers).forEach(t=>{if(t.interval)clearInterval(t.interval);});
  S.activeTimers={};
  await fbSave(sk,S.log[sk]);
  showToast("&#x2713; Session saved!");render();
};

window.clearSession=async()=>{
  const sk=getActiveSessionKey();
  await fbDel(sk);delete S.log[sk];
  if(S.sessionClockInterval)clearInterval(S.sessionClockInterval);
  S.sessionStartDate=null;S.sessionStartTs=null;S.sessionElapsedMs=0;
  S.activeTimers={};S.confirmClear=false;
  showToast("Session cleared");render();
};

window.delSess=async k=>{
  await fbDel(k);delete S.log[k];S.confirmDeleteKey=null;S.openEx["h_"+k]=false;showToast("Session deleted");render();
};

window.saveProfile=async()=>{
  const hEl=document.getElementById("inp-height"),nEl=document.getElementById("inp-neck");
  if(!hEl||!nEl)return;
  const hv=parseFloat(hEl.value),nv=parseFloat(nEl.value);
  if(!hv||!nv){showToast("Enter both height and neck");return;}
  S.profile.heightCm=mToCm(hv);S.profile.neckCm=mToCm(nv);
  await fbSaveProfile(S.profile);showToast("Profile saved!");render();
};

window.logStats=async()=>{
  const wEl=document.getElementById("inp-weight"),waistEl=document.getElementById("inp-waist");
  if(!wEl||!waistEl)return;
  const wv=parseFloat(wEl.value),waistV=parseFloat(waistEl.value);
  if(!wv||!waistV){showToast("Enter weight and waist");return;}
  const entry={date:new Date().toISOString().slice(0,10),weightKg:wToKg(wv),waistCm:mToCm(waistV)};
  if(!S.profile.stats)S.profile.stats=[];
  const idx=S.profile.stats.findIndex(s=>s.date===entry.date);
  if(idx>=0)S.profile.stats[idx]=entry;else S.profile.stats.push(entry);
  await fbSaveProfile(S.profile);showToast("Check-in logged!");render();
};

window.delStat=async idx=>{
  S.profile.stats.splice(idx,1);
  await fbSaveProfile(S.profile);showToast("Entry deleted");render();
};
</script>
</body>
</html>
